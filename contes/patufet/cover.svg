<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" preserveAspectRatio="xMidYMid slice">
  <defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#cfe8ff"/><stop offset="1" stop-color="#fff5e6"/></linearGradient></defs>
  <rect width="300" height="400" fill="url(#sky)"/>
  <ellipse cx="150" cy="360" rx="260" ry="45" fill="#8cd2a0"/>
  <!-- giant mushroom -->
  <g transform="translate(120,180)">
    <rect x="25" y="80" width="20" height="90" fill="#ffffff"/>
    <ellipse cx="35" cy="80" rx="45" ry="25" fill="#d93048"/>
    <circle cx="20" cy="72" r="4" fill="#fff"/>
    <circle cx="50" cy="68" r="4" fill="#fff"/>
    <circle cx="35" cy="80" r="4" fill="#fff"/>
  </g>
  <!-- patufet: tiny character -->
  <g transform="translate(60,290)">
    <rect x="6" y="18" width="18" height="30" fill="#d93048" rx="3"/>
    <circle cx="15" cy="12" r="9" fill="#ffd9c0"/>
    <polygon points="7,7 12,-5 18,7 24,-4 25,12" fill="#2b2140"/>
    <polygon points="2,8 8,5 8,12" fill="#d93048"/>
    <circle cx="12" cy="12" r="0.8" fill="#2b2140"/><circle cx="18" cy="12" r="0.8" fill="#2b2140"/>
    <rect x="8" y="48" width="6" height="10" fill="#3455a3"/>
    <rect x="16" y="48" width="6" height="10" fill="#3455a3"/>
  </g>
  <text x="150" y="60" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="36" font-weight="800" fill="#2b2140">En Patufet</text>
</svg>
