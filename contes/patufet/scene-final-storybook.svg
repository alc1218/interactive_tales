<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="skyP4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd0a8"/>
      <stop offset="1" stop-color="#fbe6c0"/>
    </linearGradient>
    <radialGradient id="sunP4" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff5b3"/>
      <stop offset=".5" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#ffae3b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grassP4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9bd884"/>
      <stop offset="1" stop-color="#3d8a4c"/>
    </linearGradient>
    <linearGradient id="dressP4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5d8acb"/>
      <stop offset="1" stop-color="#2c5489"/>
    </linearGradient>
    <linearGradient id="jacketP4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6cb060"/>
      <stop offset="1" stop-color="#2c6a3a"/>
    </linearGradient>
    <linearGradient id="capP4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef4153"/>
      <stop offset="1" stop-color="#a3192a"/>
    </linearGradient>
    <radialGradient id="skinP4" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#ffe6cf"/>
      <stop offset="1" stop-color="#e8b48a"/>
    </radialGradient>
    <radialGradient id="heartP4" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#ff7a8c"/>
      <stop offset="1" stop-color="#a3192a"/>
    </radialGradient>
    <filter id="softShadowP4" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#skyP4)"/>
  <circle cx="300" cy="140" r="180" fill="url(#sunP4)" opacity=".75"/>
  <circle cx="300" cy="140" r="40" fill="#fff5b3"/>
  <circle cx="300" cy="140" r="30" fill="#ffd86b"/>

  <!-- distant hills -->
  <path d="M-20 380 L120 320 L260 360 L400 310 L540 350 L620 330 L620 420 L-20 420 Z" fill="#7392b8" opacity=".4"/>

  <!-- meadow -->
  <ellipse cx="300" cy="540" rx="600" ry="220" fill="url(#grassP4)"/>

  <!-- Big heart in middle background -->
  <g filter="url(#softShadowP4)" transform="translate(300,260)">
    <path d="M0 30 C-50 -10, -50 -50, -25 -50 C-10 -50, 0 -35, 0 -25 C0 -35, 10 -50, 25 -50 C50 -50, 50 -10, 0 30 Z" fill="url(#heartP4)"/>
    <path d="M-15 -38 q5 -8 12 -5" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" opacity=".7"/>
  </g>

  <!-- Mother on left -->
  <g filter="url(#softShadowP4)" transform="translate(170,360)">
    <ellipse cx="0" cy="180" rx="50" ry="8" fill="#0006"/>
    <path d="M-45 175 L-35 30 q0 -10 35 -10 q35 0 35 10 L45 175 z" fill="url(#dressP4)"/>
    <path d="M-22 175 L-20 50 q5 -5 20 -5 q15 0 20 5 L22 175 z" fill="#f0e2d0" opacity=".7"/>
    <circle cx="0" cy="-10" r="30" fill="url(#skinP4)"/>
    <path d="M-30 -20 q5 -28 30 -28 q25 0 30 28 q-5 -10 -30 -10 q-25 0 -30 10 z" fill="#8b5a2a"/>
    <circle cx="-8" cy="-8" r="3" fill="#fff"/>
    <circle cx="-8" cy="-8" r="1.7" fill="#2b2140"/>
    <circle cx="8" cy="-8" r="3" fill="#fff"/>
    <circle cx="8" cy="-8" r="1.7" fill="#2b2140"/>
    <circle cx="-7" cy="-9" r=".7" fill="#fff"/>
    <path d="M-6 4 q6 5 12 0" stroke="#7a2a3e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-16" cy="0" r="4.5" fill="#ff9bb5" opacity=".55"/>
    <circle cx="16" cy="0" r="4.5" fill="#ff9bb5" opacity=".55"/>
  </g>

  <!-- Father on right -->
  <g filter="url(#softShadowP4)" transform="translate(430,360)">
    <ellipse cx="0" cy="180" rx="50" ry="8" fill="#0006"/>
    <!-- pants -->
    <rect x="-22" y="100" width="44" height="80" fill="#5d4a1f"/>
    <!-- jacket -->
    <path d="M-42 100 L-32 30 q0 -10 32 -10 q32 0 32 10 L42 100 z" fill="url(#jacketP4)"/>
    <!-- shirt under -->
    <rect x="-8" y="20" width="16" height="20" fill="#fff"/>
    <circle cx="0" cy="-10" r="30" fill="url(#skinP4)"/>
    <!-- hair -->
    <path d="M-30 -22 q5 -22 30 -22 q25 0 30 22 q-5 -8 -30 -8 q-25 0 -30 8 z" fill="#5d3a1a"/>
    <!-- beard -->
    <path d="M-20 5 q5 12 20 12 q15 0 20 -12 q-5 8 -20 8 q-15 0 -20 -8 z" fill="#5d3a1a"/>
    <circle cx="-8" cy="-8" r="3" fill="#fff"/>
    <circle cx="-8" cy="-8" r="1.7" fill="#2b2140"/>
    <circle cx="8" cy="-8" r="3" fill="#fff"/>
    <circle cx="8" cy="-8" r="1.7" fill="#2b2140"/>
    <circle cx="-7" cy="-9" r=".7" fill="#fff"/>
    <path d="M-6 4 q6 5 12 0" stroke="#7a2a3e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-16" cy="0" r="4.5" fill="#ff9bb5" opacity=".55"/>
    <circle cx="16" cy="0" r="4.5" fill="#ff9bb5" opacity=".55"/>
  </g>

  <!-- Patufet between them, tiny -->
  <g filter="url(#softShadowP4)" transform="translate(300,470)">
    <ellipse cx="0" cy="65" rx="22" ry="5" fill="#0006"/>
    <ellipse cx="0" cy="20" rx="18" ry="26" fill="#fff"/>
    <rect x="-16" y="35" width="32" height="22" fill="#5d4a1f"/>
    <rect x="-12" y="55" width="8" height="12" fill="#3a2a18"/>
    <rect x="4" y="55" width="8" height="12" fill="#3a2a18"/>
    <circle cx="0" cy="-10" r="18" fill="url(#skinP4)"/>
    <path d="M-16 -16 q16 -28 32 0 q-3 -10 -16 -10 q-13 0 -16 10 z" fill="url(#capP4)"/>
    <path d="M14 -16 q12 -10 24 -2 q-4 6 -13 5 q-7 -2 -11 -3" fill="url(#capP4)"/>
    <circle cx="-6" cy="-10" r="2.5" fill="#fff"/>
    <circle cx="-6" cy="-10" r="1.4" fill="#2b2140"/>
    <circle cx="6" cy="-10" r="2.5" fill="#fff"/>
    <circle cx="6" cy="-10" r="1.4" fill="#2b2140"/>
    <path d="M-4 -3 q4 4 8 0" stroke="#7a2a3e" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <circle cx="-12" cy="-4" r="3" fill="#ff9bb5" opacity=".55"/>
    <circle cx="12" cy="-4" r="3" fill="#ff9bb5" opacity=".55"/>
  </g>

  <!-- mini hearts floating -->
  <g fill="#ef4153" opacity=".7">
    <path d="M150 220 c-8 -4, -8 -14, -4 -14 s4 4 4 4 s0 -4 4 -4 s4 10 -4 14 z"/>
    <path d="M460 200 c-6 -3, -6 -10, -3 -10 s3 3 3 3 s0 -3 3 -3 s3 7 -3 10 z"/>
  </g>

  <g fill="#2e6e3a" opacity=".55">
    <path d="M0 580 q20 -22 38 0 q12 -18 28 0 q15 -22 30 0 z"/>
    <path d="M460 580 q18 -22 36 0 q15 -22 32 0 q15 -22 30 0 z"/>
  </g>
</svg>
