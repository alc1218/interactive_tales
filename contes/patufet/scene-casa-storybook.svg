<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="wallP1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7d4a0"/>
      <stop offset="1" stop-color="#d8a060"/>
    </linearGradient>
    <linearGradient id="floorP1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a4754a"/>
      <stop offset="1" stop-color="#6e4a26"/>
    </linearGradient>
    <linearGradient id="tableP1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c08a52"/>
      <stop offset="1" stop-color="#7a4d22"/>
    </linearGradient>
    <linearGradient id="dressP1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5d8acb"/>
      <stop offset="1" stop-color="#2c5489"/>
    </linearGradient>
    <linearGradient id="capP1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef4153"/>
      <stop offset="1" stop-color="#a3192a"/>
    </linearGradient>
    <radialGradient id="skinP1" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#ffe6cf"/>
      <stop offset="1" stop-color="#e8b48a"/>
    </radialGradient>
    <radialGradient id="warmGlowP1" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff5b3" stop-opacity=".6"/>
      <stop offset="1" stop-color="#ffd86b" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadowP1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- warm wall -->
  <rect width="600" height="420" fill="url(#wallP1)"/>
  <!-- floor -->
  <rect y="420" width="600" height="180" fill="url(#floorP1)"/>
  <!-- floor planks -->
  <g stroke="#5b3917" stroke-width="1.2" opacity=".4">
    <line x1="0" y1="460" x2="600" y2="460"/>
    <line x1="0" y1="510" x2="600" y2="510"/>
    <line x1="0" y1="560" x2="600" y2="560"/>
  </g>

  <!-- window with warm glow -->
  <g filter="url(#softShadowP1)">
    <rect x="420" y="70" width="120" height="140" fill="#c8e8f5" rx="4"/>
    <rect x="420" y="70" width="120" height="140" fill="url(#warmGlowP1)"/>
    <line x1="480" y1="70" x2="480" y2="210" stroke="#7a4d22" stroke-width="3"/>
    <line x1="420" y1="140" x2="540" y2="140" stroke="#7a4d22" stroke-width="3"/>
    <rect x="412" y="60" width="136" height="14" fill="#7a4d22" rx="2"/>
  </g>

  <!-- hanging pot -->
  <g filter="url(#softShadowP1)" transform="translate(120,130)">
    <line x1="0" y1="-60" x2="0" y2="0" stroke="#6e4a26" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="22" ry="8" fill="#7a3a2a"/>
    <path d="M-22 0 q0 30 22 30 q22 0 22 -30 z" fill="#9b4536"/>
  </g>

  <!-- table -->
  <g filter="url(#softShadowP1)">
    <rect x="100" y="380" width="400" height="30" fill="url(#tableP1)" rx="4"/>
    <rect x="120" y="410" width="20" height="120" fill="#7a4d22"/>
    <rect x="460" y="410" width="20" height="120" fill="#7a4d22"/>
  </g>

  <!-- Patufet on table - tiny -->
  <g filter="url(#softShadowP1)" transform="translate(310,310)">
    <!-- body -->
    <ellipse cx="0" cy="50" rx="14" ry="22" fill="#fff"/>
    <rect x="-13" y="50" width="26" height="20" fill="#5d4a1f"/>
    <!-- legs -->
    <rect x="-9" y="68" width="6" height="12" fill="#3a2a18"/>
    <rect x="3" y="68" width="6" height="12" fill="#3a2a18"/>
    <!-- head -->
    <circle cx="0" cy="22" r="14" fill="url(#skinP1)"/>
    <!-- barretina (red cap) -->
    <path d="M-12 14 q12 -22 24 0 q-2 -8 -12 -8 q-10 0 -12 8 z" fill="url(#capP1)"/>
    <path d="M11 14 q8 -8 18 -2 q-3 5 -10 4 q-5 -1 -8 -2" fill="url(#capP1)"/>
    <!-- eyes -->
    <circle cx="-5" cy="22" r="2.2" fill="#fff"/>
    <circle cx="-5" cy="22" r="1.3" fill="#2b2140"/>
    <circle cx="5" cy="22" r="2.2" fill="#fff"/>
    <circle cx="5" cy="22" r="1.3" fill="#2b2140"/>
    <!-- smile -->
    <path d="M-3 28 q3 3 6 0" stroke="#7a2a3e" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <circle cx="-9" cy="26" r="2.5" fill="#ff9bb5" opacity=".6"/>
    <circle cx="9" cy="26" r="2.5" fill="#ff9bb5" opacity=".6"/>
  </g>

  <!-- Mother on left -->
  <g filter="url(#softShadowP1)" transform="translate(140,250)">
    <!-- dress -->
    <path d="M-45 130 L-35 30 q0 -10 35 -10 q35 0 35 10 L45 130 z" fill="url(#dressP1)"/>
    <!-- apron -->
    <path d="M-22 130 L-20 50 q5 -5 20 -5 q15 0 20 5 L22 130 z" fill="#f0e2d0" opacity=".8"/>
    <!-- arms -->
    <path d="M-35 30 q-15 25 -10 50" stroke="url(#skinP1)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M35 30 q15 20 28 35" stroke="url(#skinP1)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- head -->
    <circle cx="0" cy="-10" r="30" fill="url(#skinP1)"/>
    <!-- hair -->
    <path d="M-30 -20 q5 -28 30 -28 q25 0 30 28 q-5 -10 -30 -10 q-25 0 -30 10 z" fill="#8b5a2a"/>
    <!-- eyes -->
    <circle cx="-8" cy="-8" r="3" fill="#fff"/>
    <circle cx="-8" cy="-8" r="1.7" fill="#2b2140"/>
    <circle cx="8" cy="-8" r="3" fill="#fff"/>
    <circle cx="8" cy="-8" r="1.7" fill="#2b2140"/>
    <circle cx="-7" cy="-9" r=".7" fill="#fff"/>
    <path d="M-5 4 q5 4 10 0" stroke="#7a2a3e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-16" cy="0" r="4.5" fill="#ff9bb5" opacity=".55"/>
    <circle cx="16" cy="0" r="4.5" fill="#ff9bb5" opacity=".55"/>
    <!-- basket in hand -->
    <g transform="translate(60,65)">
      <path d="M-18 0 q0 -5 18 -5 q18 0 18 5 L15 24 q-5 4 -15 4 q-10 0 -15 -4 z" fill="#a06414"/>
      <path d="M-16 -3 q16 -20 32 0" stroke="#7d4f12" stroke-width="3" fill="none"/>
      <!-- coins peeking -->
      <circle cx="-6" cy="-2" r="5" fill="#ffd86b"/>
      <text x="-6" y="2" text-anchor="middle" font-family="Arial" font-size="8" fill="#7a5400" font-weight="bold">€</text>
      <circle cx="6" cy="-2" r="5" fill="#ffd86b"/>
      <text x="6" y="2" text-anchor="middle" font-family="Arial" font-size="8" fill="#7a5400" font-weight="bold">€</text>
    </g>
  </g>

  <!-- floating gold coins above table -->
  <g filter="url(#softShadowP1)">
    <circle cx="380" cy="350" r="8" fill="#ffd86b"/>
    <text x="380" y="355" text-anchor="middle" font-family="Arial" font-size="11" fill="#7a5400" font-weight="bold">€</text>
    <circle cx="410" cy="365" r="6" fill="#ffd86b"/>
    <text x="410" y="369" text-anchor="middle" font-family="Arial" font-size="9" fill="#7a5400" font-weight="bold">€</text>
  </g>
</svg>
