<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="skyP2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8cc4e8"/>
      <stop offset="1" stop-color="#fbe6c0"/>
    </linearGradient>
    <radialGradient id="sunP2" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff8d0"/>
      <stop offset=".5" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#ffae3b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="yellowHouseP2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe390"/>
      <stop offset="1" stop-color="#d8a040"/>
    </linearGradient>
    <linearGradient id="blueHouseP2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8c8ec"/>
      <stop offset="1" stop-color="#5683b8"/>
    </linearGradient>
    <linearGradient id="roofP2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c84d3d"/>
      <stop offset="1" stop-color="#7a2a1e"/>
    </linearGradient>
    <linearGradient id="cobbleP2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cbb89a"/>
      <stop offset="1" stop-color="#8a7a5a"/>
    </linearGradient>
    <linearGradient id="capP2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef4153"/>
      <stop offset="1" stop-color="#a3192a"/>
    </linearGradient>
    <radialGradient id="skinP2" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#ffe6cf"/>
      <stop offset="1" stop-color="#e8b48a"/>
    </radialGradient>
    <filter id="softShadowP2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#skyP2)"/>
  <circle cx="300" cy="100" r="130" fill="url(#sunP2)" opacity=".7"/>
  <circle cx="300" cy="100" r="30" fill="#fff5b3"/>

  <!-- clouds -->
  <g filter="url(#softShadowP2)">
    <ellipse cx="100" cy="80" rx="40" ry="14" fill="#fff"/>
    <ellipse cx="500" cy="90" rx="40" ry="14" fill="#fff"/>
  </g>

  <!-- yellow house left -->
  <g filter="url(#softShadowP2)">
    <rect x="20" y="280" width="180" height="220" fill="url(#yellowHouseP2)"/>
    <path d="M10 280 L110 200 L210 280 Z" fill="url(#roofP2)"/>
    <rect x="40" y="320" width="40" height="40" fill="#a8c8ec"/>
    <line x1="60" y1="320" x2="60" y2="360" stroke="#7a4d22" stroke-width="2"/>
    <line x1="40" y1="340" x2="80" y2="340" stroke="#7a4d22" stroke-width="2"/>
    <rect x="120" y="320" width="40" height="40" fill="#a8c8ec"/>
    <line x1="140" y1="320" x2="140" y2="360" stroke="#7a4d22" stroke-width="2"/>
    <line x1="120" y1="340" x2="160" y2="340" stroke="#7a4d22" stroke-width="2"/>
    <rect x="80" y="400" width="60" height="100" fill="#7a4d22"/>
    <circle cx="130" cy="450" r="3" fill="#ffd86b"/>
  </g>

  <!-- blue house right -->
  <g filter="url(#softShadowP2)">
    <rect x="400" y="280" width="180" height="220" fill="url(#blueHouseP2)"/>
    <path d="M390 280 L490 200 L590 280 Z" fill="url(#roofP2)"/>
    <rect x="420" y="320" width="40" height="40" fill="#fff5b3"/>
    <line x1="440" y1="320" x2="440" y2="360" stroke="#7a4d22" stroke-width="2"/>
    <line x1="420" y1="340" x2="460" y2="340" stroke="#7a4d22" stroke-width="2"/>
    <rect x="500" y="320" width="40" height="40" fill="#fff5b3"/>
    <line x1="520" y1="320" x2="520" y2="360" stroke="#7a4d22" stroke-width="2"/>
    <line x1="500" y1="340" x2="540" y2="340" stroke="#7a4d22" stroke-width="2"/>
    <rect x="460" y="400" width="60" height="100" fill="#7a4d22"/>
    <circle cx="510" cy="450" r="3" fill="#ffd86b"/>
  </g>

  <!-- cobblestone street -->
  <rect y="500" width="600" height="100" fill="url(#cobbleP2)"/>
  <g fill="#7a6a4a" opacity=".5">
    <ellipse cx="60" cy="525" rx="20" ry="8"/>
    <ellipse cx="130" cy="540" rx="22" ry="8"/>
    <ellipse cx="210" cy="525" rx="20" ry="7"/>
    <ellipse cx="290" cy="540" rx="22" ry="8"/>
    <ellipse cx="380" cy="525" rx="20" ry="8"/>
    <ellipse cx="470" cy="540" rx="22" ry="8"/>
    <ellipse cx="550" cy="528" rx="20" ry="7"/>
    <ellipse cx="100" cy="570" rx="20" ry="7"/>
    <ellipse cx="250" cy="575" rx="22" ry="8"/>
    <ellipse cx="430" cy="572" rx="20" ry="8"/>
    <ellipse cx="540" cy="578" rx="22" ry="8"/>
  </g>

  <!-- Patufet walking down center -->
  <g filter="url(#softShadowP2)" transform="translate(290,420)">
    <ellipse cx="0" cy="60" rx="20" ry="5" fill="#0006"/>
    <!-- body white shirt -->
    <ellipse cx="0" cy="20" rx="18" ry="26" fill="#fff"/>
    <!-- pants -->
    <rect x="-16" y="35" width="32" height="22" fill="#5d4a1f"/>
    <!-- legs walking -->
    <rect x="-12" y="55" width="8" height="14" fill="#3a2a18" transform="rotate(-10 -8 60)"/>
    <rect x="4" y="55" width="8" height="14" fill="#3a2a18" transform="rotate(10 8 60)"/>
    <!-- arms swinging -->
    <path d="M-18 15 q-12 8 -12 22" stroke="url(#skinP2)" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M18 15 q12 -3 18 5" stroke="url(#skinP2)" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- head -->
    <circle cx="0" cy="-10" r="18" fill="url(#skinP2)"/>
    <!-- barretina -->
    <path d="M-16 -16 q16 -28 32 0 q-3 -10 -16 -10 q-13 0 -16 10 z" fill="url(#capP2)"/>
    <path d="M14 -16 q12 -10 24 -2 q-4 6 -13 5 q-7 -2 -11 -3" fill="url(#capP2)"/>
    <!-- eyes -->
    <circle cx="-6" cy="-10" r="2.5" fill="#fff"/>
    <circle cx="-6" cy="-10" r="1.4" fill="#2b2140"/>
    <circle cx="6" cy="-10" r="2.5" fill="#fff"/>
    <circle cx="6" cy="-10" r="1.4" fill="#2b2140"/>
    <path d="M-4 -3 q4 4 8 0" stroke="#7a2a3e" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <circle cx="-12" cy="-4" r="3" fill="#ff9bb5" opacity=".55"/>
    <circle cx="12" cy="-4" r="3" fill="#ff9bb5" opacity=".55"/>
    <!-- basket -->
    <g transform="translate(30,28)">
      <path d="M-12 0 q0 -3 12 -3 q12 0 12 3 L10 16 q-3 3 -10 3 q-7 0 -10 -3 z" fill="#a06414"/>
      <path d="M-10 -2 q10 -14 22 0" stroke="#7d4f12" stroke-width="2" fill="none"/>
    </g>
  </g>

  <!-- music notes -->
  <g fill="#a3192a" font-family="Georgia" font-size="40">
    <text x="200" y="280">♪</text>
    <text x="370" y="240">♫</text>
    <text x="160" y="380" font-size="32">♪</text>
    <text x="430" y="350" font-size="32">♫</text>
  </g>
</svg>
