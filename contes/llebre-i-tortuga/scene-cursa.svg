<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#eaf4ff"/>
  <ellipse cx="150" cy="265" rx="260" ry="45" fill="#8cd2a0"/>
  <!-- road -->
  <path d="M20 250 Q150 220 280 250" stroke="#d6b27a" stroke-width="18" fill="none" stroke-linecap="round" opacity=".8"/>
  <!-- hare running fast -->
  <g transform="translate(190,160)">
    <ellipse cx="40" cy="65" rx="40" ry="20" fill="#c9a26b"/>
    <circle cx="65" cy="45" r="18" fill="#d8b480"/>
    <polygon points="58,35 55,12 66,35" fill="#d8b480"/>
    <polygon points="72,35 76,12 79,35" fill="#d8b480"/>
    <circle cx="60" cy="45" r="1.5" fill="#2b2140"/>
    <!-- motion lines -->
    <g stroke="#6a9bff" stroke-width="2" fill="none" opacity=".6">
      <line x1="-5" y1="60" x2="-25" y2="58"/>
      <line x1="0" y1="70" x2="-20" y2="72"/>
    </g>
  </g>
  <!-- tortoise slow far behind -->
  <g transform="translate(25,200)">
    <ellipse cx="35" cy="30" rx="32" ry="16" fill="#4aa568"/>
    <ellipse cx="35" cy="28" rx="25" ry="12" fill="#3f8b54"/>
    <circle cx="65" cy="30" r="8" fill="#7ecb8e"/>
    <circle cx="67" cy="28" r="1" fill="#2b2140"/>
  </g>
</svg>
