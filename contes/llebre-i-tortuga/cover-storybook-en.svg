<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="skyLT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8d8eb"/>
      <stop offset="1" stop-color="#fbe6c0"/>
    </linearGradient>
    <radialGradient id="sunLT" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff7c2"/>
      <stop offset=".55" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#ffae3b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grassLT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9bd884"/>
      <stop offset="1" stop-color="#3d8a4c"/>
    </linearGradient>
    <radialGradient id="cloudLT" cx=".5" cy=".4" r=".55">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dde9f2"/>
    </radialGradient>
    <radialGradient id="hareBody" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#e8d6b8"/>
      <stop offset="1" stop-color="#9c7a4a"/>
    </radialGradient>
    <radialGradient id="hareHead" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#f0e0c4"/>
      <stop offset="1" stop-color="#a88454"/>
    </radialGradient>
    <radialGradient id="tortShell" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#a8c870"/>
      <stop offset="1" stop-color="#4e6a2a"/>
    </radialGradient>
    <radialGradient id="tortSkin" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#cae0a0"/>
      <stop offset="1" stop-color="#6a8c40"/>
    </radialGradient>
    <linearGradient id="pathLT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d6a370"/>
      <stop offset="1" stop-color="#a16f3f"/>
    </linearGradient>
    <linearGradient id="ribbonLT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6cb060"/>
      <stop offset="1" stop-color="#2c6a3a"/>
    </linearGradient>
    <filter id="softShadowLT" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="800" fill="url(#skyLT)"/>

  <!-- frame -->
  <rect x="20" y="20" width="560" height="760" rx="22" fill="none" stroke="#fff" stroke-width="6" opacity=".7"/>
  <rect x="32" y="32" width="536" height="736" rx="16" fill="none" stroke="#5e3a18" stroke-width="3" opacity=".55"/>

  <!-- sun -->
  <circle cx="500" cy="220" r="150" fill="url(#sunLT)" opacity=".75"/>
  <circle cx="500" cy="220" r="40" fill="#fff5b3"/>
  <circle cx="500" cy="220" r="30" fill="#ffd86b"/>

  <!-- clouds -->
  <g filter="url(#softShadowLT)">
    <ellipse cx="120" cy="180" rx="55" ry="20" fill="url(#cloudLT)"/>
    <ellipse cx="155" cy="172" rx="38" ry="16" fill="url(#cloudLT)"/>
    <ellipse cx="320" cy="140" rx="46" ry="17" fill="url(#cloudLT)"/>
  </g>

  <!-- mountains -->
  <path d="M0 460 L80 380 L180 440 L280 360 L380 420 L490 350 L600 420 L600 500 L0 500 Z" fill="#7392b8" opacity=".5"/>
  <path d="M0 490 L120 420 L240 470 L340 410 L460 460 L560 410 L600 450 L600 520 L0 520 Z" fill="#5c7aa1" opacity=".4"/>

  <!-- distant trees -->
  <g opacity=".75">
    <ellipse cx="60" cy="500" rx="45" ry="28" fill="#3a7140"/>
    <ellipse cx="540" cy="500" rx="50" ry="30" fill="#3a7140"/>
  </g>

  <!-- meadow -->
  <ellipse cx="300" cy="700" rx="600" ry="220" fill="url(#grassLT)"/>

  <!-- dirt path -->
  <path d="M-20 590 Q300 540 620 590 Q300 610 -20 590 Z" fill="url(#pathLT)" opacity=".9"/>
  <path d="M-20 590 Q300 540 620 590" stroke="#d6a370" stroke-width="2" fill="none" opacity=".5" stroke-dasharray="6 8"/>

  <!-- hare on left, mid-sprint -->
  <g filter="url(#softShadowLT)" transform="translate(80,440)">
    <ellipse cx="65" cy="135" rx="50" ry="8" fill="#0006"/>
    <!-- back legs (long) -->
    <ellipse cx="40" cy="120" rx="30" ry="14" fill="url(#hareBody)" transform="rotate(-20 40 120)"/>
    <!-- body lean forward -->
    <ellipse cx="80" cy="100" rx="55" ry="32" fill="url(#hareBody)" transform="rotate(-12 80 100)"/>
    <!-- front legs -->
    <rect x="120" y="115" width="10" height="22" rx="5" fill="#9c7a4a"/>
    <rect x="105" y="118" width="10" height="20" rx="5" fill="#9c7a4a"/>
    <!-- tail -->
    <circle cx="32" cy="92" r="9" fill="#fff"/>
    <!-- head -->
    <circle cx="135" cy="80" r="26" fill="url(#hareHead)"/>
    <!-- ears long -->
    <path d="M118 60 q-8 -50 4 -60 q14 8 8 56 z" fill="url(#hareHead)"/>
    <path d="M138 60 q-4 -50 12 -58 q12 14 0 56 z" fill="url(#hareHead)"/>
    <path d="M122 56 q-4 -32 4 -42" stroke="#ff9bb5" stroke-width="3" fill="none" opacity=".7"/>
    <!-- face -->
    <circle cx="148" cy="78" r="3.2" fill="#fff"/><circle cx="148" cy="78" r="2" fill="#2b2140"/><circle cx="149" cy="77" r=".7" fill="#fff"/>
    <ellipse cx="156" cy="86" rx="3" ry="2" fill="#ff97b3"/>
    <path d="M152 92 q4 4 8 0" stroke="#7a2a3e" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="140" cy="92" r="4" fill="#ff9bb5" opacity=".55"/>
    <!-- whiskers -->
    <line x1="155" y1="89" x2="172" y2="86" stroke="#5c3a18" stroke-width=".8"/>
    <line x1="155" y1="92" x2="172" y2="92" stroke="#5c3a18" stroke-width=".8"/>
    <!-- speed lines -->
    <g stroke="#fff" stroke-width="2" opacity=".7" stroke-linecap="round">
      <line x1="-10" y1="100" x2="20" y2="100"/>
      <line x1="-10" y1="115" x2="15" y2="115"/>
      <line x1="-15" y1="130" x2="10" y2="130"/>
    </g>
  </g>

  <!-- tortoise on right, plodding -->
  <g filter="url(#softShadowLT)" transform="translate(360,500)">
    <ellipse cx="80" cy="105" rx="65" ry="8" fill="#0006"/>
    <!-- shell -->
    <path d="M20 75 q60 -55 120 0 q-60 25 -120 0 z" fill="url(#tortShell)"/>
    <!-- shell pattern hexagons -->
    <g fill="#3a5a18" opacity=".55" stroke="#3a5a18" stroke-width="1">
      <polygon points="50,55 65,50 80,55 80,68 65,73 50,68"/>
      <polygon points="85,52 100,47 115,52 115,65 100,70 85,65"/>
      <polygon points="68,72 83,67 98,72 98,80 83,82 68,80"/>
    </g>
    <!-- head -->
    <ellipse cx="155" cy="85" rx="18" ry="13" fill="url(#tortSkin)"/>
    <circle cx="160" cy="82" r="2.6" fill="#fff"/><circle cx="160" cy="82" r="1.6" fill="#2b2140"/>
    <path d="M160 92 q4 3 8 0" stroke="#7a2a3e" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <circle cx="150" cy="90" r="3.5" fill="#ff9bb5" opacity=".55"/>
    <!-- legs -->
    <ellipse cx="40" cy="100" rx="14" ry="9" fill="url(#tortSkin)"/>
    <ellipse cx="120" cy="100" rx="14" ry="9" fill="url(#tortSkin)"/>
    <!-- tail -->
    <path d="M20 80 q-10 -2 -16 4" stroke="url(#tortSkin)" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>

  <!-- title ribbon at top -->
  <g filter="url(#softShadowLT)">
    <rect x="40" y="80" width="520" height="80" rx="14" fill="url(#ribbonLT)" opacity=".95"/>
  </g>
  <text x="300" y="133" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="33" font-weight="800" fill="#fff" stroke="#1c4a26" stroke-width="5" stroke-linejoin="round" paint-order="stroke fill">The Hare and the Tortoise</text>
</svg>
