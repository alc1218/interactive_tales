<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="skyLT4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8cc4e8"/>
      <stop offset="1" stop-color="#fbe6c0"/>
    </linearGradient>
    <radialGradient id="sunLT4" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff8d0"/>
      <stop offset=".5" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#ffae3b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grassLT4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9bd884"/>
      <stop offset="1" stop-color="#3d8a4c"/>
    </linearGradient>
    <linearGradient id="bannerLT4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef4153"/>
      <stop offset="1" stop-color="#a3192a"/>
    </linearGradient>
    <radialGradient id="trophyLT4" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#fff5a0"/>
      <stop offset=".5" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#b88512"/>
    </radialGradient>
    <radialGradient id="hareBodyLT4" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#e8d8c0"/>
      <stop offset="1" stop-color="#a98760"/>
    </radialGradient>
    <radialGradient id="tortShellLT4" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#9ec46a"/>
      <stop offset="1" stop-color="#4d6b1a"/>
    </radialGradient>
    <filter id="softShadowLT4" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#skyLT4)"/>
  <circle cx="100" cy="120" r="130" fill="url(#sunLT4)" opacity=".7"/>
  <circle cx="100" cy="120" r="32" fill="#fff5b3"/>

  <!-- mountains -->
  <path d="M-20 360 L100 290 L260 320 L380 270 L520 320 L620 290 L620 400 L-20 400 Z" fill="#7392b8" opacity=".5"/>

  <!-- meadow -->
  <ellipse cx="300" cy="540" rx="600" ry="200" fill="url(#grassLT4)"/>

  <!-- finish line poles + banner -->
  <g filter="url(#softShadowLT4)">
    <rect x="120" y="200" width="10" height="280" fill="#5b3a1f"/>
    <rect x="470" y="200" width="10" height="280" fill="#5b3a1f"/>
    <!-- banner -->
    <path d="M115 200 Q300 240 485 200 L485 270 Q300 310 115 270 Z" fill="url(#bannerLT4)"/>
    <text x="300" y="255" text-anchor="middle" font-family="Georgia" font-size="44" fill="#fff" font-weight="bold">META!</text>
    <!-- finish line ribbon strip -->
    <line x1="125" y1="380" x2="475" y2="380" stroke="#fff" stroke-width="3"/>
  </g>

  <!-- Hare arriving late behind, panting -->
  <g filter="url(#softShadowLT4)" transform="translate(500,400)">
    <ellipse cx="0" cy="100" rx="40" ry="7" fill="#0006"/>
    <ellipse cx="0" cy="60" rx="38" ry="40" fill="url(#hareBodyLT4)"/>
    <ellipse cx="-12" cy="95" rx="9" ry="7" fill="#a98760"/>
    <ellipse cx="14" cy="95" rx="9" ry="7" fill="#a98760"/>
    <circle cx="0" cy="20" r="26" fill="url(#hareBodyLT4)"/>
    <path d="M-15 0 q-12 -45 -4 -55 q12 -2 8 45 z" fill="url(#hareBodyLT4)"/>
    <path d="M-12 -3 q-7 -36 -2 -42 q6 0 4 32 z" fill="#ffd0d8"/>
    <path d="M5 0 q12 -45 16 -50 q10 4 -2 47 z" fill="url(#hareBodyLT4)"/>
    <path d="M8 -3 q7 -34 12 -38 q5 2 -3 32 z" fill="#ffd0d8"/>
    <!-- sad eyes -->
    <path d="M-12 18 q5 4 10 0" stroke="#2b2140" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M2 18 q5 4 10 0" stroke="#2b2140" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <ellipse cx="0" cy="28" rx="3" ry="2" fill="#e87a98"/>
    <path d="M-3 38 q3 -3 6 0" stroke="#7a2a3e" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- sweat drop -->
    <path d="M-30 -5 q-3 5 0 8 q3 -3 0 -8 z" fill="#5ec0e8"/>
  </g>

  <!-- Trophy -->
  <g filter="url(#softShadowLT4)" transform="translate(400,420)">
    <ellipse cx="0" cy="80" rx="40" ry="6" fill="#0006"/>
    <rect x="-22" y="60" width="44" height="20" fill="#b88512" rx="2"/>
    <rect x="-30" y="50" width="60" height="14" fill="#ffd86b" rx="3"/>
    <path d="M-25 50 L-25 10 q0 -8 25 -8 q25 0 25 8 L25 50 z" fill="url(#trophyLT4)"/>
    <path d="M-25 18 q-18 0 -18 14 q0 12 18 12" stroke="#b88512" stroke-width="4" fill="none"/>
    <path d="M25 18 q18 0 18 14 q0 12 -18 12" stroke="#b88512" stroke-width="4" fill="none"/>
    <text x="0" y="35" text-anchor="middle" font-family="Georgia" font-size="20" fill="#7a5400" font-weight="bold">1</text>
  </g>

  <!-- Tortoise crossing finish line, victorious -->
  <g filter="url(#softShadowLT4)" transform="translate(280,400)">
    <ellipse cx="0" cy="55" rx="60" ry="8" fill="#0006"/>
    <ellipse cx="0" cy="20" rx="55" ry="34" fill="url(#tortShellLT4)"/>
    <path d="M-32 20 q16 -8 32 0 q16 -8 32 0" stroke="#3d6b22" stroke-width="2.2" fill="none" opacity=".6"/>
    <path d="M-15 5 l5 8 M0 5 l0 10 M15 5 l-5 8" stroke="#3d6b22" stroke-width="1.5" opacity=".6"/>
    <ellipse cx="-38" cy="42" rx="11" ry="7" fill="#7d9a45"/>
    <ellipse cx="38" cy="42" rx="11" ry="7" fill="#7d9a45"/>
    <ellipse cx="55" cy="20" rx="16" ry="12" fill="#7d9a45"/>
    <!-- happy face -->
    <circle cx="58" cy="16" r="3" fill="#fff"/>
    <circle cx="59" cy="16" r="1.7" fill="#2b2140"/>
    <circle cx="60" cy="15" r=".6" fill="#fff"/>
    <path d="M52 24 q5 5 10 0" stroke="#5d4a1f" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <circle cx="50" cy="26" r="3" fill="#ff9bb5" opacity=".5"/>
    <!-- arms up -->
    <path d="M-30 0 q-10 -20 -5 -30" stroke="#7d9a45" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>

  <!-- confetti -->
  <g>
    <rect x="180" y="120" width="6" height="10" fill="#ef4153" transform="rotate(20 183 125)"/>
    <rect x="240" y="160" width="6" height="10" fill="#ffd86b" transform="rotate(-15 243 165)"/>
    <rect x="350" y="140" width="6" height="10" fill="#5ec0e8" transform="rotate(40 353 145)"/>
    <rect x="420" y="170" width="6" height="10" fill="#9bd884" transform="rotate(-30 423 175)"/>
  </g>

  <g fill="#2e6e3a" opacity=".55">
    <path d="M0 580 q20 -22 38 0 q12 -18 28 0 q15 -22 30 0 z"/>
    <path d="M460 580 q18 -22 36 0 q15 -22 32 0 q15 -22 30 0 z"/>
  </g>
</svg>
