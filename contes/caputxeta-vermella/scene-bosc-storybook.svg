<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="skyCV2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8d8eb"/>
      <stop offset="1" stop-color="#fbe6c0"/>
    </linearGradient>
    <linearGradient id="grassCV2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fc070"/>
      <stop offset="1" stop-color="#2c6a3a"/>
    </linearGradient>
    <radialGradient id="sunCV2" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff8d0"/>
      <stop offset=".5" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#ffae3b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="redCloakB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef4153"/>
      <stop offset="1" stop-color="#a3192a"/>
    </linearGradient>
    <linearGradient id="treeTrunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7d4f2a"/>
      <stop offset="1" stop-color="#4a2d18"/>
    </linearGradient>
    <radialGradient id="treeFol" cx=".5" cy=".5" r=".6">
      <stop offset="0" stop-color="#6cb060"/>
      <stop offset="1" stop-color="#2c6a3a"/>
    </radialGradient>
    <linearGradient id="pathCV2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d6a370"/>
      <stop offset="1" stop-color="#a16f3f"/>
    </linearGradient>
    <radialGradient id="skinCV2" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#ffe6cf"/>
      <stop offset="1" stop-color="#e8b48a"/>
    </radialGradient>
    <linearGradient id="sunbeam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff8c0" stop-opacity=".7"/>
      <stop offset="1" stop-color="#fff8c0" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadowCV2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#skyCV2)"/>

  <!-- sun behind trees -->
  <circle cx="300" cy="100" r="180" fill="url(#sunCV2)" opacity=".7"/>
  <circle cx="300" cy="100" r="35" fill="#fff5b3"/>

  <!-- sunbeams -->
  <g opacity=".6">
    <polygon points="280,80 320,80 380,500 240,500" fill="url(#sunbeam)"/>
    <polygon points="180,90 220,90 140,500 60,500" fill="url(#sunbeam)"/>
    <polygon points="380,80 420,80 500,500 440,500" fill="url(#sunbeam)"/>
  </g>

  <!-- distant trees -->
  <g opacity=".55">
    <ellipse cx="80" cy="320" rx="40" ry="80" fill="#3a7140"/>
    <ellipse cx="520" cy="310" rx="45" ry="90" fill="#3a7140"/>
    <ellipse cx="160" cy="330" rx="35" ry="70" fill="#4c8c52"/>
    <ellipse cx="450" cy="325" rx="40" ry="80" fill="#4c8c52"/>
  </g>

  <!-- ground meadow -->
  <ellipse cx="300" cy="540" rx="600" ry="200" fill="url(#grassCV2)"/>

  <!-- winding path -->
  <path d="M250 600 Q280 480 200 400 Q150 340 300 280 Q450 240 320 180" stroke="url(#pathCV2)" stroke-width="60" fill="none" stroke-linecap="round" opacity=".85"/>
  <path d="M250 600 Q280 480 200 400 Q150 340 300 280 Q450 240 320 180" stroke="#e8c090" stroke-width="2" fill="none" opacity=".5" stroke-dasharray="6 8"/>

  <!-- trees foreground -->
  <g filter="url(#softShadowCV2)">
    <rect x="50" y="380" width="22" height="120" fill="url(#treeTrunk)"/>
    <ellipse cx="61" cy="350" rx="60" ry="80" fill="url(#treeFol)"/>
    <ellipse cx="40" cy="320" rx="30" ry="30" fill="#6cb060"/>

    <rect x="510" y="370" width="24" height="130" fill="url(#treeTrunk)"/>
    <ellipse cx="522" cy="340" rx="65" ry="85" fill="url(#treeFol)"/>
    <ellipse cx="550" cy="310" rx="32" ry="32" fill="#6cb060"/>

    <rect x="470" y="430" width="18" height="80" fill="url(#treeTrunk)"/>
    <ellipse cx="479" cy="410" rx="40" ry="55" fill="url(#treeFol)"/>
  </g>

  <!-- Red on path -->
  <g filter="url(#softShadowCV2)" transform="translate(290,360)">
    <ellipse cx="0" cy="135" rx="35" ry="6" fill="#0006"/>
    <!-- cloak -->
    <path d="M-40 130 L-45 30 q0 -10 5 -15 L40 15 q5 5 5 15 L40 130 z" fill="url(#redCloakB)"/>
    <!-- dress -->
    <path d="M-22 130 L-22 50 q0 -10 22 -10 q22 0 22 10 L22 130 z" fill="#f0e2d0"/>
    <!-- head -->
    <circle cx="0" cy="-10" r="28" fill="url(#skinCV2)"/>
    <!-- hood -->
    <path d="M-30 -10 q-5 -45 30 -50 q35 5 30 50 q-2 -22 -30 -22 q-28 0 -30 22 z" fill="url(#redCloakB)"/>
    <!-- hair -->
    <path d="M-18 -15 q5 -8 18 -8 q13 0 18 8 q-5 -2 -18 -2 q-13 0 -18 2 z" fill="#c08040"/>
    <!-- face -->
    <circle cx="-8" cy="-8" r="3" fill="#fff"/><circle cx="-8" cy="-8" r="1.8" fill="#2b2140"/>
    <circle cx="8" cy="-8" r="3" fill="#fff"/><circle cx="8" cy="-8" r="1.8" fill="#2b2140"/>
    <circle cx="-7" cy="-9" r=".7" fill="#fff"/>
    <path d="M-5 3 q5 4 10 0" stroke="#7a2a3e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-15" cy="0" r="4.5" fill="#ff9bb5" opacity=".55"/>
    <circle cx="15" cy="0" r="4.5" fill="#ff9bb5" opacity=".55"/>
    <!-- arm + basket -->
    <path d="M30 50 q15 5 25 25" stroke="url(#skinCV2)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <g transform="translate(60,80)">
      <path d="M-20 0 q0 -5 20 -5 q20 0 20 5 L17 28 q-5 5 -17 5 q-12 0 -17 -5 z" fill="#a06414"/>
      <path d="M-18 -3 q18 -22 36 0" stroke="#7d4f12" stroke-width="3" fill="none"/>
      <ellipse cx="-5" cy="-5" rx="8" ry="5" fill="#d8a060"/>
      <circle cx="10" cy="-2" r="5" fill="#e84d3d"/>
    </g>
  </g>

  <!-- flowers -->
  <g>
    <g transform="translate(120,490)"><circle r="5" fill="#fff7c2"/><circle r="2" fill="#ffae3b"/></g>
    <g transform="translate(180,540)"><circle r="5" fill="#ffd0e0"/><circle r="2" fill="#e87a98"/></g>
    <g transform="translate(420,480)"><circle r="5" fill="#cfe2ff"/><circle r="2" fill="#5683b8"/></g>
    <g transform="translate(440,560)"><circle r="5" fill="#fff7c2"/><circle r="2" fill="#ffae3b"/></g>
    <g transform="translate(80,560)"><circle r="5" fill="#ffd0e0"/><circle r="2" fill="#e87a98"/></g>
  </g>

  <!-- foreground grass tufts -->
  <g fill="#1f5230" opacity=".6">
    <path d="M0 580 q20 -22 38 0 q12 -18 28 0 q15 -22 30 0 z"/>
    <path d="M460 580 q18 -22 36 0 q15 -22 32 0 q15 -22 30 0 z"/>
  </g>
</svg>
