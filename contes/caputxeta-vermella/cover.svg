<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" preserveAspectRatio="xMidYMid slice">
  <defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c5e3ff"/><stop offset="1" stop-color="#e9f7d3"/></linearGradient></defs>
  <rect width="300" height="400" fill="url(#sky)"/>
  <!-- trees -->
  <g>
    <polygon points="40,270 70,200 100,270" fill="#4f9a62"/><rect x="63" y="270" width="14" height="30" fill="#7a431d"/>
    <polygon points="210,265 240,195 270,265" fill="#4f9a62"/><rect x="231" y="265" width="14" height="32" fill="#7a431d"/>
  </g>
  <ellipse cx="150" cy="360" rx="240" ry="45" fill="#8cd2a0"/>
  <!-- Red Riding Hood -->
  <g transform="translate(100,160)">
    <!-- cloak -->
    <path d="M0 100 Q50 160 100 100 L95 180 L5 180 Z" fill="#d93048"/>
    <!-- hood -->
    <path d="M10 40 Q50 0 90 40 L90 90 Q50 110 10 90 Z" fill="#d93048"/>
    <!-- face -->
    <circle cx="50" cy="70" r="28" fill="#ffd9c0"/>
    <circle cx="42" cy="68" r="2" fill="#2b2140"/>
    <circle cx="58" cy="68" r="2" fill="#2b2140"/>
    <path d="M44 80 Q50 85 56 80" stroke="#2b2140" stroke-width="1.5" fill="none"/>
    <!-- basket -->
    <rect x="60" y="140" width="40" height="22" rx="3" fill="#c88a4c" stroke="#7a431d" stroke-width="2"/>
    <path d="M60 140 Q80 120 100 140" fill="none" stroke="#7a431d" stroke-width="2"/>
  </g>
  <text x="150" y="60" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="28" font-weight="800" fill="#2b2140">La Caputxeta</text>
  <text x="150" y="95" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="28" font-weight="800" fill="#d93048">Vermella</text>
</svg>
