<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="wallCV4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4dabb"/>
      <stop offset="1" stop-color="#c89762"/>
    </linearGradient>
    <linearGradient id="floorCV4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a06432"/>
      <stop offset="1" stop-color="#5e3a1c"/>
    </linearGradient>
    <linearGradient id="blanketCV4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7aa8e0"/>
      <stop offset="1" stop-color="#3d6aa8"/>
    </linearGradient>
    <linearGradient id="bonnetCV4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd6e2"/>
      <stop offset="1" stop-color="#e887a4"/>
    </linearGradient>
    <radialGradient id="wolfHeadCV4" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#a8aebc"/>
      <stop offset="1" stop-color="#3d424d"/>
    </radialGradient>
    <linearGradient id="bedFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7d4f2a"/>
      <stop offset="1" stop-color="#4a2d18"/>
    </linearGradient>
    <filter id="softShadowCV4" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- back wall -->
  <rect width="600" height="450" fill="url(#wallCV4)"/>
  <!-- floor -->
  <rect y="450" width="600" height="150" fill="url(#floorCV4)"/>
  <g stroke="#7a4d22" stroke-width="1" opacity=".5">
    <line x1="0" y1="475" x2="600" y2="475"/>
    <line x1="0" y1="510" x2="600" y2="510"/>
    <line x1="0" y1="545" x2="600" y2="545"/>
  </g>

  <!-- window left -->
  <g filter="url(#softShadowCV4)">
    <rect x="40" y="100" width="100" height="120" fill="#9ed3f0" stroke="#7d4f2a" stroke-width="6"/>
    <line x1="90" y1="100" x2="90" y2="220" stroke="#7d4f2a" stroke-width="4"/>
    <line x1="40" y1="160" x2="140" y2="160" stroke="#7d4f2a" stroke-width="4"/>
    <!-- moon outside -->
    <circle cx="90" cy="135" r="20" fill="#fff7c2" opacity=".8"/>
    <circle cx="98" cy="130" r="14" fill="#ffd86b"/>
  </g>

  <!-- picture frame -->
  <g filter="url(#softShadowCV4)">
    <rect x="430" y="100" width="100" height="80" fill="#fffaf0" stroke="#7d4f2a" stroke-width="6"/>
    <circle cx="465" cy="135" r="12" fill="#ff9bb5"/>
    <circle cx="495" cy="135" r="12" fill="#ff9bb5"/>
    <path d="M453 145 q12 12 24 0" stroke="#7a2a3e" stroke-width="2" fill="none"/>
  </g>

  <!-- four-poster bed -->
  <g filter="url(#softShadowCV4)">
    <!-- posts -->
    <rect x="120" y="240" width="20" height="280" fill="url(#bedFrame)"/>
    <rect x="460" y="240" width="20" height="280" fill="url(#bedFrame)"/>
    <circle cx="130" cy="240" r="14" fill="#a06414"/>
    <circle cx="470" cy="240" r="14" fill="#a06414"/>
    <!-- canopy -->
    <rect x="115" y="245" width="370" height="14" fill="url(#bedFrame)"/>
    <path d="M115 259 q185 30 370 0 L485 270 q-185 25 -370 0 z" fill="#c84858"/>
    <!-- headboard -->
    <rect x="140" y="320" width="320" height="80" rx="8" fill="url(#bedFrame)"/>
    <!-- mattress -->
    <rect x="125" y="400" width="350" height="60" fill="#fffaf0"/>
    <!-- blanket -->
    <path d="M125 430 L475 430 L475 510 q-175 20 -350 0 z" fill="url(#blanketCV4)"/>
    <g stroke="#2c4a78" stroke-width="1.5" opacity=".5" fill="none">
      <path d="M125 450 q175 8 350 0"/>
      <path d="M125 470 q175 8 350 0"/>
      <path d="M125 490 q175 8 350 0"/>
    </g>
    <!-- pillow -->
    <ellipse cx="200" cy="410" rx="60" ry="20" fill="#fffaf0"/>
  </g>

  <!-- wolf in bed with bonnet -->
  <g filter="url(#softShadowCV4)" transform="translate(230,360)">
    <!-- head/body shape under blanket -->
    <ellipse cx="0" cy="40" rx="80" ry="40" fill="url(#blanketCV4)"/>
    <!-- head -->
    <ellipse cx="0" cy="0" rx="55" ry="50" fill="url(#wolfHeadCV4)"/>
    <!-- snout -->
    <ellipse cx="0" cy="20" rx="22" ry="16" fill="#a8aebc"/>
    <ellipse cx="0" cy="8" rx="6" ry="4" fill="#1a1a22"/>
    <!-- big sneaky eyes -->
    <circle cx="-18" cy="-5" r="8" fill="#fff"/>
    <circle cx="-16" cy="-3" r="5" fill="#1a1a22"/>
    <circle cx="-14" cy="-5" r="1.5" fill="#fff"/>
    <circle cx="18" cy="-5" r="8" fill="#fff"/>
    <circle cx="20" cy="-3" r="5" fill="#1a1a22"/>
    <circle cx="22" cy="-5" r="1.5" fill="#fff"/>
    <!-- grin -->
    <path d="M-20 25 q20 14 40 0" stroke="#1a1a22" stroke-width="2.5" fill="#3a1018"/>
    <polygon points="-12,28 -10,38 -7,28" fill="#fff"/>
    <polygon points="8,28 10,38 12,28" fill="#fff"/>
    <!-- bonnet (pink with frill) -->
    <path d="M-58 -10 q-2 -55 58 -55 q60 0 58 55 q-30 -25 -58 -25 q-28 0 -58 25 z" fill="url(#bonnetCV4)"/>
    <!-- frill scallops -->
    <g fill="url(#bonnetCV4)">
      <circle cx="-50" cy="-15" r="6"/>
      <circle cx="-30" cy="-30" r="6"/>
      <circle cx="-5" cy="-40" r="6"/>
      <circle cx="22" cy="-37" r="6"/>
      <circle cx="45" cy="-22" r="6"/>
    </g>
    <!-- bow -->
    <path d="M-40 35 q-15 -12 -25 -2 q5 8 25 5 q-5 -5 0 -10 z" fill="#e887a4"/>
    <path d="M-40 35 q15 -12 25 -2 q-5 8 -25 5 q5 -5 0 -10 z" fill="#e887a4"/>
    <circle cx="-40" cy="35" r="4" fill="#c84858"/>
    <!-- ears poking through bonnet -->
    <path d="M-45 -30 L-55 -50 L-30 -38 z" fill="#454a55" opacity=".7"/>
    <path d="M45 -30 L55 -50 L30 -38 z" fill="#454a55" opacity=".7"/>
  </g>

  <!-- bedside lamp -->
  <g filter="url(#softShadowCV4)" transform="translate(540,420)">
    <rect x="-3" y="0" width="6" height="40" fill="#5d3a20"/>
    <path d="M-22 0 L22 0 L15 -25 L-15 -25 z" fill="#fff7c2"/>
    <ellipse cx="0" cy="50" rx="20" ry="5" fill="#5d3a20"/>
  </g>
</svg>
