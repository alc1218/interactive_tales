<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="skyCV5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ed3f0"/>
      <stop offset="1" stop-color="#ffe4b8"/>
    </linearGradient>
    <linearGradient id="grassCV5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a4dd8c"/>
      <stop offset="1" stop-color="#3d7c45"/>
    </linearGradient>
    <radialGradient id="sunCV5" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff7c2"/>
      <stop offset=".55" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#ffae3b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="redCloakF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef4153"/>
      <stop offset="1" stop-color="#a3192a"/>
    </linearGradient>
    <linearGradient id="cottageWallF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5d8a8"/>
      <stop offset="1" stop-color="#c89762"/>
    </linearGradient>
    <linearGradient id="cottageRoofF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a45a3c"/>
      <stop offset="1" stop-color="#6b3a26"/>
    </linearGradient>
    <linearGradient id="hunterJacket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a8a4a"/>
      <stop offset="1" stop-color="#2c4a26"/>
    </linearGradient>
    <linearGradient id="grannyDress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff5d8"/>
      <stop offset="1" stop-color="#e8d4a0"/>
    </linearGradient>
    <radialGradient id="skinCV5" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#ffe6cf"/>
      <stop offset="1" stop-color="#e8b48a"/>
    </radialGradient>
    <filter id="softShadowCV5" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#skyCV5)"/>

  <!-- sun -->
  <circle cx="490" cy="110" r="160" fill="url(#sunCV5)"/>
  <circle cx="490" cy="110" r="42" fill="#fff5b3"/>
  <circle cx="490" cy="110" r="32" fill="#ffd86b"/>

  <!-- distant hills -->
  <path d="M-20 360 L120 290 L260 340 L380 280 L520 330 L620 290 L620 400 L-20 400 Z" fill="#7392b8" opacity=".5"/>
  <path d="M-20 390 L150 340 L300 380 L450 335 L620 375 L620 410 L-20 410 Z" fill="#5c7aa1" opacity=".4"/>

  <!-- clouds -->
  <g opacity=".95">
    <ellipse cx="120" cy="100" rx="55" ry="20" fill="#fff"/>
    <ellipse cx="155" cy="95" rx="38" ry="16" fill="#fff"/>
    <ellipse cx="92" cy="108" rx="30" ry="14" fill="#fff"/>
  </g>

  <!-- cottage backdrop -->
  <g filter="url(#softShadowCV5)">
    <polygon points="80,330 520,330 300,160" fill="url(#cottageRoofF)"/>
    <rect x="100" y="330" width="400" height="200" fill="url(#cottageWallF)"/>
    <!-- door open behind family -->
    <path d="M260 530 L260 380 q0 -25 40 -25 q40 0 40 25 L340 530 z" fill="#3a1f10"/>
    <path d="M270 525 L270 385 q0 -20 30 -20 q30 0 30 20 L330 525 z" fill="#a06414"/>
    <!-- windows -->
    <rect x="140" y="360" width="50" height="50" rx="6" fill="#ffd86b" stroke="#7d4f12" stroke-width="4"/>
    <line x1="140" y1="385" x2="190" y2="385" stroke="#7d4f12" stroke-width="2"/>
    <line x1="165" y1="360" x2="165" y2="410" stroke="#7d4f12" stroke-width="2"/>
    <rect x="410" y="360" width="50" height="50" rx="6" fill="#ffd86b" stroke="#7d4f12" stroke-width="4"/>
    <line x1="410" y1="385" x2="460" y2="385" stroke="#7d4f12" stroke-width="2"/>
    <line x1="435" y1="360" x2="435" y2="410" stroke="#7d4f12" stroke-width="2"/>
    <!-- chimney with smoke -->
    <rect x="395" y="195" width="22" height="55" fill="#7d4f2a"/>
    <ellipse cx="406" cy="180" rx="10" ry="6" fill="#ddd" opacity=".7"/>
    <ellipse cx="412" cy="160" rx="14" ry="8" fill="#ddd" opacity=".6"/>
  </g>

  <!-- meadow -->
  <ellipse cx="300" cy="560" rx="600" ry="180" fill="url(#grassCV5)"/>

  <!-- floating heart -->
  <g transform="translate(300,200)" filter="url(#softShadowCV5)">
    <path d="M0 12 L-15 -3 q-10 -10 0 -18 q10 -8 15 5 q5 -13 15 -5 q10 8 0 18 z" fill="#ef4153"/>
  </g>

  <!-- Red (left) -->
  <g filter="url(#softShadowCV5)" transform="translate(170,360)">
    <ellipse cx="0" cy="170" rx="40" ry="7" fill="#0006"/>
    <path d="M-38 165 L-42 50 q0 -10 5 -15 L38 35 q5 5 5 15 L38 165 z" fill="url(#redCloakF)"/>
    <path d="M-22 165 L-22 70 q0 -10 22 -10 q22 0 22 10 L22 165 z" fill="#f0e2d0"/>
    <circle cx="0" cy="10" r="28" fill="url(#skinCV5)"/>
    <path d="M-30 10 q-5 -45 30 -50 q35 5 30 50 q-2 -22 -30 -22 q-28 0 -30 22 z" fill="url(#redCloakF)"/>
    <path d="M-18 5 q5 -8 18 -8 q13 0 18 8 q-5 -2 -18 -2 q-13 0 -18 2 z" fill="#c08040"/>
    <circle cx="-8" cy="13" r="3" fill="#fff"/><circle cx="-8" cy="13" r="1.8" fill="#2b2140"/>
    <circle cx="8" cy="13" r="3" fill="#fff"/><circle cx="8" cy="13" r="1.8" fill="#2b2140"/>
    <path d="M-7 24 q7 6 14 0" stroke="#7a2a3e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-15" cy="20" r="5" fill="#ff9bb5" opacity=".55"/>
    <circle cx="15" cy="20" r="5" fill="#ff9bb5" opacity=".55"/>
  </g>

  <!-- Granny (center) -->
  <g filter="url(#softShadowCV5)" transform="translate(300,360)">
    <ellipse cx="0" cy="170" rx="45" ry="7" fill="#0006"/>
    <path d="M-50 165 L-50 50 q0 -15 50 -15 q50 0 50 15 L50 165 z" fill="url(#grannyDress)"/>
    <circle cx="0" cy="5" r="32" fill="url(#skinCV5)"/>
    <!-- white hair bun -->
    <path d="M-30 -8 q0 -28 30 -28 q30 0 30 28 q-2 -10 -30 -10 q-28 0 -30 10 z" fill="#e8e0d0"/>
    <ellipse cx="0" cy="-30" rx="14" ry="10" fill="#e8e0d0"/>
    <!-- glasses -->
    <circle cx="-10" cy="8" r="6" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
    <circle cx="10" cy="8" r="6" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
    <line x1="-4" y1="8" x2="4" y2="8" stroke="#3a3a3a" stroke-width="1.5"/>
    <circle cx="-10" cy="9" r="1.5" fill="#2b2140"/>
    <circle cx="10" cy="9" r="1.5" fill="#2b2140"/>
    <path d="M-7 22 q7 5 14 0" stroke="#7a2a3e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-20" cy="18" r="5" fill="#ff9bb5" opacity=".5"/>
    <circle cx="20" cy="18" r="5" fill="#ff9bb5" opacity=".5"/>
    <!-- shawl -->
    <path d="M-50 50 q50 25 100 0 L48 70 q-48 20 -96 0 z" fill="#c84858" opacity=".6"/>
  </g>

  <!-- Hunter (right) -->
  <g filter="url(#softShadowCV5)" transform="translate(440,340)">
    <ellipse cx="0" cy="190" rx="42" ry="7" fill="#0006"/>
    <!-- legs -->
    <rect x="-22" y="140" width="18" height="50" rx="4" fill="#5d3a1c"/>
    <rect x="6" y="140" width="18" height="50" rx="4" fill="#5d3a1c"/>
    <!-- jacket -->
    <path d="M-40 145 L-45 50 q0 -10 5 -15 L40 35 q5 5 5 15 L40 145 z" fill="url(#hunterJacket)"/>
    <!-- collar -->
    <path d="M-15 35 L0 55 L15 35 z" fill="#3a4a26"/>
    <!-- buttons -->
    <circle cx="0" cy="65" r="2.5" fill="#ffd86b"/>
    <circle cx="0" cy="85" r="2.5" fill="#ffd86b"/>
    <circle cx="0" cy="105" r="2.5" fill="#ffd86b"/>
    <!-- head -->
    <circle cx="0" cy="10" r="28" fill="url(#skinCV5)"/>
    <!-- hat green with feather -->
    <path d="M-32 -8 L32 -8 q5 0 5 -5 L30 -25 q-30 -10 -60 0 L-37 -13 q0 5 5 5 z" fill="#3a4a26"/>
    <ellipse cx="0" cy="-8" rx="35" ry="4" fill="#2c3a1c"/>
    <path d="M22 -22 q12 -8 18 0 q-3 -2 -18 0 z" fill="#c84858"/>
    <!-- beard/mustache -->
    <path d="M-15 18 q15 8 30 0 q-3 8 -15 8 q-12 0 -15 -8 z" fill="#7a4a2a"/>
    <!-- eyes -->
    <circle cx="-9" cy="8" r="3" fill="#fff"/><circle cx="-9" cy="8" r="1.8" fill="#2b2140"/>
    <circle cx="9" cy="8" r="3" fill="#fff"/><circle cx="9" cy="8" r="1.8" fill="#2b2140"/>
    <path d="M-7 28 q7 4 14 0" stroke="#7a2a3e" stroke-width="2" fill="none"/>
  </g>

  <!-- foreground tufts -->
  <g fill="#2e6e3a" opacity=".55">
    <path d="M0 575 q20 -22 38 0 q12 -18 28 0 q15 -22 30 0 z"/>
    <path d="M460 575 q18 -22 36 0 q15 -22 32 0 q15 -22 30 0 z"/>
  </g>
  <g>
    <g transform="translate(80,545)"><circle r="4" fill="#fff7c2"/><circle r="1.6" fill="#ffae3b"/></g>
    <g transform="translate(540,560)"><circle r="4" fill="#ffd0e0"/><circle r="1.6" fill="#e87a98"/></g>
  </g>
</svg>
