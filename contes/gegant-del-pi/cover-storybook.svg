<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="skyGP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fcae8"/>
      <stop offset=".55" stop-color="#cee6f5"/>
      <stop offset="1" stop-color="#fbe6c0"/>
    </linearGradient>
    <radialGradient id="sunGP" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff7c2"/>
      <stop offset=".55" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#ffae3b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grassGP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9bd884"/>
      <stop offset="1" stop-color="#3d8a4c"/>
    </linearGradient>
    <radialGradient id="cloudGP" cx=".5" cy=".4" r=".55">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dde9f2"/>
    </radialGradient>
    <linearGradient id="pineGP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a7140"/>
      <stop offset="1" stop-color="#1c4a26"/>
    </linearGradient>
    <linearGradient id="trunkGP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7d4f2a"/>
      <stop offset="1" stop-color="#3e2210"/>
    </linearGradient>
    <radialGradient id="giantBody" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#94c4e0"/>
      <stop offset="1" stop-color="#3e6e8c"/>
    </radialGradient>
    <radialGradient id="giantSkin" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#ffe6cf"/>
      <stop offset="1" stop-color="#cc9c70"/>
    </radialGradient>
    <linearGradient id="mountainGP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7392b8"/>
      <stop offset="1" stop-color="#5c7aa1"/>
    </linearGradient>
    <linearGradient id="ribbonGP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3e6e8c"/>
      <stop offset="1" stop-color="#1f4860"/>
    </linearGradient>
    <filter id="softShadowGP" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="800" fill="url(#skyGP)"/>

  <!-- frame -->
  <rect x="20" y="20" width="560" height="760" rx="22" fill="none" stroke="#fff" stroke-width="6" opacity=".7"/>
  <rect x="32" y="32" width="536" height="736" rx="16" fill="none" stroke="#3e2210" stroke-width="3" opacity=".55"/>

  <!-- sun -->
  <circle cx="120" cy="220" r="140" fill="url(#sunGP)" opacity=".75"/>
  <circle cx="120" cy="220" r="40" fill="#fff5b3"/>
  <circle cx="120" cy="220" r="30" fill="#ffd86b"/>

  <!-- clouds -->
  <g filter="url(#softShadowGP)">
    <ellipse cx="430" cy="180" rx="55" ry="20" fill="url(#cloudGP)"/>
    <ellipse cx="465" cy="172" rx="38" ry="16" fill="url(#cloudGP)"/>
    <ellipse cx="280" cy="130" rx="40" ry="15" fill="url(#cloudGP)"/>
  </g>

  <!-- distant mountains layer 1 -->
  <path d="M0 540 L100 420 L200 500 L300 380 L420 480 L520 400 L600 470 L600 600 L0 600 Z" fill="url(#mountainGP)" opacity=".55"/>
  <path d="M250 380 L260 370 L275 388 Z" fill="#f3f7fb" opacity=".75"/>
  <!-- mountains layer 2 -->
  <path d="M0 580 L120 480 L240 540 L350 460 L470 530 L600 480 L600 620 L0 620 Z" fill="#5c7aa1" opacity=".5"/>

  <!-- big mountain peak under giant -->
  <path d="M150 640 L300 380 L450 640 Z" fill="#7392b8" opacity=".75"/>
  <path d="M280 410 L300 380 L325 415 L310 425 L295 418 Z" fill="#f3f7fb" opacity=".8"/>

  <!-- giant pine on peak -->
  <g filter="url(#softShadowGP)" transform="translate(360,300)">
    <rect x="-8" y="180" width="16" height="80" fill="url(#trunkGP)"/>
    <path d="M-50 200 L0 80 L50 200 Z" fill="url(#pineGP)"/>
    <path d="M-44 160 L0 50 L44 160 Z" fill="url(#pineGP)"/>
    <path d="M-36 110 L0 20 L36 110 Z" fill="url(#pineGP)"/>
  </g>

  <!-- giant standing -->
  <g filter="url(#softShadowGP)" transform="translate(220,420)">
    <ellipse cx="0" cy="170" rx="42" ry="6" fill="#0006"/>
    <!-- legs -->
    <rect x="-22" y="100" width="18" height="70" rx="6" fill="#5e3a18"/>
    <rect x="4" y="100" width="18" height="70" rx="6" fill="#5e3a18"/>
    <!-- body / tunic -->
    <path d="M-40 30 q0 -15 40 -15 q40 0 40 15 L40 105 q0 6 -10 6 L-30 111 q-10 0 -10 -6 z" fill="url(#giantBody)"/>
    <!-- belt -->
    <rect x="-40" y="95" width="80" height="10" fill="#5e3a18"/>
    <circle cx="0" cy="100" r="5" fill="#ffd86b"/>
    <!-- arms -->
    <path d="M-40 30 q-20 20 -22 60" stroke="url(#giantSkin)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M40 30 q20 20 22 60" stroke="url(#giantSkin)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- head -->
    <circle cx="0" cy="-10" r="34" fill="url(#giantSkin)"/>
    <!-- hair / beard -->
    <path d="M-30 -20 q-2 -36 30 -38 q32 2 30 38 q-3 -18 -30 -18 q-27 0 -30 18 z" fill="#a05a22"/>
    <path d="M-22 8 q22 18 44 0 q-2 18 -22 18 q-20 0 -22 -18 z" fill="#a05a22"/>
    <!-- face -->
    <circle cx="-9" cy="-12" r="3.2" fill="#fff"/><circle cx="-9" cy="-12" r="1.9" fill="#2b2140"/><circle cx="-8" cy="-13" r=".7" fill="#fff"/>
    <circle cx="9" cy="-12" r="3.2" fill="#fff"/><circle cx="9" cy="-12" r="1.9" fill="#2b2140"/><circle cx="10" cy="-13" r=".7" fill="#fff"/>
    <path d="M-6 4 q6 5 12 0" stroke="#7a2a3e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-16" cy="-2" r="4.5" fill="#ff9bb5" opacity=".55"/>
    <circle cx="16" cy="-2" r="4.5" fill="#ff9bb5" opacity=".55"/>
  </g>

  <!-- meadow base -->
  <ellipse cx="300" cy="780" rx="520" ry="100" fill="url(#grassGP)"/>

  <!-- title ribbon -->
  <g filter="url(#softShadowGP)">
    <path d="M50 80 L550 80 L535 155 L65 155 Z" fill="url(#ribbonGP)"/>
    <path d="M50 80 L65 155 L40 165 L30 95 Z" fill="#1f4860"/>
    <path d="M550 80 L535 155 L560 165 L570 95 Z" fill="#1f4860"/>
  </g>
  <text x="300" y="130" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="44" font-weight="800" fill="#fff" stroke="#0f2030" stroke-width="6" stroke-linejoin="round" paint-order="stroke fill">El Gegant del Pi</text>
</svg>
