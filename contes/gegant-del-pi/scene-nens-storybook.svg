<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="skyGP3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ed3f0"/>
      <stop offset="1" stop-color="#ffe4b8"/>
    </linearGradient>
    <linearGradient id="grassGP3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9bd884"/>
      <stop offset="1" stop-color="#3d8a4c"/>
    </linearGradient>
    <radialGradient id="sunGP3" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff7c2"/>
      <stop offset=".55" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#ffae3b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pineGP3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5ea862"/>
      <stop offset="1" stop-color="#1f5230"/>
    </linearGradient>
    <linearGradient id="boyShirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd84a"/>
      <stop offset="1" stop-color="#c89008"/>
    </linearGradient>
    <linearGradient id="girlDress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef4153"/>
      <stop offset="1" stop-color="#a3192a"/>
    </linearGradient>
    <radialGradient id="skinGP3" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#ffe6cf"/>
      <stop offset="1" stop-color="#e8b48a"/>
    </radialGradient>
    <linearGradient id="rockGP3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8a8a8"/>
      <stop offset="1" stop-color="#6a6a6a"/>
    </linearGradient>
    <filter id="softShadowGP3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#skyGP3)"/>

  <!-- sun -->
  <circle cx="120" cy="100" r="150" fill="url(#sunGP3)"/>
  <circle cx="120" cy="100" r="36" fill="#fff5b3"/>
  <circle cx="120" cy="100" r="26" fill="#ffd86b"/>

  <!-- mountain rising -->
  <path d="M-20 500 L60 380 L180 430 L300 250 L440 360 L560 290 L620 380 L620 600 L-20 600 Z" fill="#7392b8" opacity=".6"/>
  <path d="M-20 540 L100 420 L220 470 L320 320 L460 410 L580 360 L620 420 L620 600 L-20 600 Z" fill="#5c7aa1" opacity=".5"/>
  <path d="M292 260 L300 250 L312 265 Z" fill="#f3f7fb"/>

  <!-- mountain path -->
  <path d="M100 580 Q200 500 280 460 Q360 420 420 360" stroke="#d6a370" stroke-width="40" fill="none" stroke-linecap="round" opacity=".75"/>

  <!-- big pine behind -->
  <g filter="url(#softShadowGP3)">
    <rect x="430" y="280" width="20" height="80" fill="#5d3a20"/>
    <polygon points="440,140 380,250 500,250" fill="url(#pineGP3)"/>
    <polygon points="440,200 370,290 510,290" fill="url(#pineGP3)"/>
  </g>

  <!-- rocks -->
  <g filter="url(#softShadowGP3)">
    <ellipse cx="80" cy="540" rx="40" ry="20" fill="url(#rockGP3)"/>
    <ellipse cx="540" cy="500" rx="35" ry="18" fill="url(#rockGP3)"/>
  </g>

  <!-- boy climbing (left) -->
  <g filter="url(#softShadowGP3)" transform="translate(220,420)">
    <ellipse cx="0" cy="105" rx="30" ry="6" fill="#0006"/>
    <!-- backpack -->
    <rect x="-30" y="20" width="32" height="44" rx="6" fill="#5a8aa8"/>
    <rect x="-28" y="30" width="28" height="6" fill="#3a6890"/>
    <!-- legs -->
    <rect x="-15" y="80" width="12" height="30" rx="4" fill="#5d3a1c"/>
    <rect x="3" y="80" width="12" height="30" rx="4" fill="#5d3a1c"/>
    <!-- body -->
    <path d="M-22 80 L-22 15 q0 -10 22 -10 q22 0 22 10 L22 80 z" fill="url(#boyShirt)"/>
    <!-- arms (one raised pointing) -->
    <path d="M-22 25 q-15 5 -25 -10" stroke="url(#boyShirt)" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M22 25 q15 -5 25 -25" stroke="url(#boyShirt)" stroke-width="11" fill="none" stroke-linecap="round"/>
    <!-- hands -->
    <circle cx="-48" cy="14" r="5" fill="url(#skinGP3)"/>
    <circle cx="48" cy="-1" r="5" fill="url(#skinGP3)"/>
    <!-- head -->
    <circle cx="0" cy="-15" r="20" fill="url(#skinGP3)"/>
    <!-- hair -->
    <path d="M-20 -20 q-2 -22 20 -22 q22 0 20 22 q-2 -10 -20 -10 q-18 0 -20 10 z" fill="#5d3a1c"/>
    <!-- face -->
    <circle cx="-6" cy="-12" r="2.5" fill="#fff"/><circle cx="-6" cy="-12" r="1.5" fill="#2b2140"/>
    <circle cx="6" cy="-12" r="2.5" fill="#fff"/><circle cx="6" cy="-12" r="1.5" fill="#2b2140"/>
    <path d="M-5 -2 q5 4 10 0" stroke="#7a2a3e" stroke-width="1.6" fill="none"/>
    <circle cx="-12" cy="-5" r="3.5" fill="#ff9bb5" opacity=".55"/>
    <circle cx="12" cy="-5" r="3.5" fill="#ff9bb5" opacity=".55"/>
  </g>

  <!-- girl climbing (right, slightly behind) -->
  <g filter="url(#softShadowGP3)" transform="translate(330,400)">
    <ellipse cx="0" cy="115" rx="32" ry="6" fill="#0006"/>
    <!-- legs -->
    <rect x="-12" y="90" width="10" height="28" rx="4" fill="url(#skinGP3)"/>
    <rect x="2" y="90" width="10" height="28" rx="4" fill="url(#skinGP3)"/>
    <!-- shoes -->
    <ellipse cx="-7" cy="120" rx="7" ry="3" fill="#3a1f10"/>
    <ellipse cx="7" cy="120" rx="7" ry="3" fill="#3a1f10"/>
    <!-- dress -->
    <path d="M-28 92 L-22 20 q0 -10 22 -10 q22 0 22 10 L28 92 z" fill="url(#girlDress)"/>
    <!-- arms -->
    <path d="M-22 30 q-12 8 -18 25" stroke="url(#skinGP3)" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M22 30 q12 8 18 25" stroke="url(#skinGP3)" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- head -->
    <circle cx="0" cy="-12" r="20" fill="url(#skinGP3)"/>
    <!-- pigtails -->
    <path d="M-22 -15 q-3 -25 22 -25 q25 0 22 25 q-2 -12 -22 -12 q-20 0 -22 12 z" fill="#c08040"/>
    <ellipse cx="-22" cy="-2" rx="6" ry="12" fill="#c08040"/>
    <ellipse cx="22" cy="-2" rx="6" ry="12" fill="#c08040"/>
    <circle cx="-22" cy="10" r="3" fill="#ef4153"/>
    <circle cx="22" cy="10" r="3" fill="#ef4153"/>
    <!-- face -->
    <circle cx="-6" cy="-10" r="2.5" fill="#fff"/><circle cx="-6" cy="-10" r="1.5" fill="#2b2140"/>
    <circle cx="6" cy="-10" r="2.5" fill="#fff"/><circle cx="6" cy="-10" r="1.5" fill="#2b2140"/>
    <path d="M-5 0 q5 4 10 0" stroke="#7a2a3e" stroke-width="1.6" fill="none"/>
    <circle cx="-12" cy="-3" r="3.5" fill="#ff9bb5" opacity=".55"/>
    <circle cx="12" cy="-3" r="3.5" fill="#ff9bb5" opacity=".55"/>
  </g>

  <!-- foreground tufts -->
  <g fill="#2e6e3a" opacity=".55">
    <path d="M0 580 q20 -22 38 0 q12 -18 28 0 q15 -22 30 0 z"/>
    <path d="M460 580 q18 -22 36 0 q15 -22 32 0 q15 -22 30 0 z"/>
  </g>
  <g>
    <g transform="translate(40,560)"><circle r="4" fill="#fff7c2"/><circle r="1.6" fill="#ffae3b"/></g>
    <g transform="translate(490,565)"><circle r="4" fill="#ffd0e0"/><circle r="1.6" fill="#e87a98"/></g>
  </g>
</svg>
