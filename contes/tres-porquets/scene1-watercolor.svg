<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <filter id="paperW1" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".7" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 .85  0 0 0 0 .80  0 0 0 0 .65  0 0 0 .12 0"/>
    </filter>
    <filter id="bleedW" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softBleedW" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- paper background -->
  <rect width="600" height="600" fill="#f4eedf"/>
  <rect width="600" height="600" filter="url(#paperW1)" opacity=".5"/>

  <!-- sky wash -->
  <ellipse cx="300" cy="80" rx="500" ry="250" fill="#cfe5f0" opacity=".6" filter="url(#bleedW)"/>
  <ellipse cx="200" cy="140" rx="300" ry="120" fill="#a8cbe0" opacity=".4" filter="url(#bleedW)"/>
  <ellipse cx="450" cy="200" rx="200" ry="80" fill="#f0d6a8" opacity=".35" filter="url(#bleedW)"/>

  <!-- sun bloom -->
  <circle cx="465" cy="135" r="80" fill="#ffd86b" opacity=".25" filter="url(#softBleedW)"/>
  <circle cx="465" cy="135" r="42" fill="#ffd86b" opacity=".55" filter="url(#bleedW)"/>
  <circle cx="465" cy="135" r="30" fill="#fff5b3" opacity=".75"/>

  <!-- distant hills (loose strokes) -->
  <path d="M-20 380 Q150 320 320 360 Q480 320 620 380 L620 420 L-20 420 Z"
        fill="#a8b8d0" opacity=".55" filter="url(#bleedW)"/>
  <path d="M-20 410 Q200 360 380 400 Q500 380 620 410 L620 440 L-20 440 Z"
        fill="#7c98b8" opacity=".5" filter="url(#bleedW)"/>

  <!-- meadow wash -->
  <ellipse cx="300" cy="540" rx="500" ry="180" fill="#a4c878" opacity=".55" filter="url(#bleedW)"/>
  <ellipse cx="300" cy="560" rx="500" ry="120" fill="#79a05d" opacity=".4" filter="url(#bleedW)"/>
  <!-- darker grass blots -->
  <ellipse cx="80" cy="500" rx="60" ry="20" fill="#79a05d" opacity=".5" filter="url(#bleedW)"/>
  <ellipse cx="500" cy="500" rx="60" ry="20" fill="#79a05d" opacity=".5" filter="url(#bleedW)"/>
  <ellipse cx="280" cy="525" rx="120" ry="22" fill="#79a05d" opacity=".5" filter="url(#bleedW)"/>

  <!-- clouds (soft dabs) -->
  <g opacity=".7" filter="url(#bleedW)">
    <ellipse cx="120" cy="100" rx="55" ry="20" fill="#fff"/>
    <ellipse cx="155" cy="95" rx="38" ry="16" fill="#fff"/>
    <ellipse cx="92" cy="108" rx="30" ry="14" fill="#fff"/>
    <ellipse cx="320" cy="70" rx="48" ry="18" fill="#fff"/>
  </g>

  <!-- distant tree dabs -->
  <g opacity=".55" filter="url(#bleedW)">
    <ellipse cx="40" cy="395" rx="55" ry="30" fill="#5e8a4a"/>
    <ellipse cx="100" cy="392" rx="38" ry="22" fill="#7ba65a"/>
    <ellipse cx="540" cy="395" rx="55" ry="30" fill="#5e8a4a"/>
    <ellipse cx="500" cy="392" rx="38" ry="22" fill="#7ba65a"/>
  </g>

  <!-- 3 piglets — watercolor blobs -->
  <g>
    <!-- piglet 1 -->
    <g transform="translate(150,440)">
      <ellipse cx="0" cy="20" rx="18" ry="6" fill="#0006" opacity=".25" filter="url(#bleedW)"/>
      <ellipse cx="0" cy="-10" rx="42" ry="35" fill="#ffadc1" opacity=".7" filter="url(#bleedW)"/>
      <circle cx="0" cy="-50" r="32" fill="#ffbfd0" opacity=".75" filter="url(#bleedW)"/>
      <ellipse cx="0" cy="-45" rx="14" ry="9" fill="#ff97b3" opacity=".7"/>
      <circle cx="-3" cy="-45" r="1.6" fill="#7a2a3e"/>
      <circle cx="3" cy="-45" r="1.6" fill="#7a2a3e"/>
      <circle cx="-9" cy="-58" r="2.2" fill="#2b2140"/>
      <circle cx="9" cy="-58" r="2.2" fill="#2b2140"/>
      <path d="M-7 -36 q7 5 14 0" stroke="#7a2a3e" stroke-width="1.6" fill="none"/>
      <path d="M-22 -78 q-3 -10 5 -14 q9 0 8 12 z" fill="#ffadc1" opacity=".7"/>
      <path d="M22 -78 q3 -10 -5 -14 q-9 0 -8 12 z" fill="#ffadc1" opacity=".7"/>
    </g>
    <!-- piglet 2 -->
    <g transform="translate(300,430)">
      <ellipse cx="0" cy="20" rx="20" ry="7" fill="#0006" opacity=".25" filter="url(#bleedW)"/>
      <ellipse cx="0" cy="-10" rx="48" ry="38" fill="#ffadc1" opacity=".7" filter="url(#bleedW)"/>
      <circle cx="0" cy="-55" r="36" fill="#ffbfd0" opacity=".8" filter="url(#bleedW)"/>
      <ellipse cx="0" cy="-48" rx="16" ry="10" fill="#ff97b3" opacity=".7"/>
      <circle cx="-3" cy="-48" r="1.7" fill="#7a2a3e"/>
      <circle cx="3" cy="-48" r="1.7" fill="#7a2a3e"/>
      <circle cx="-10" cy="-62" r="2.4" fill="#2b2140"/>
      <circle cx="10" cy="-62" r="2.4" fill="#2b2140"/>
      <path d="M-8 -38 q8 6 16 0" stroke="#7a2a3e" stroke-width="1.8" fill="none"/>
      <path d="M-25 -84 q-3 -12 6 -16 q10 0 9 14 z" fill="#ffadc1" opacity=".7"/>
      <path d="M25 -84 q3 -12 -6 -16 q-10 0 -9 14 z" fill="#ffadc1" opacity=".7"/>
    </g>
    <!-- piglet 3 -->
    <g transform="translate(450,440)">
      <ellipse cx="0" cy="20" rx="18" ry="6" fill="#0006" opacity=".25" filter="url(#bleedW)"/>
      <ellipse cx="0" cy="-10" rx="42" ry="35" fill="#ffadc1" opacity=".7" filter="url(#bleedW)"/>
      <circle cx="0" cy="-50" r="32" fill="#ffbfd0" opacity=".75" filter="url(#bleedW)"/>
      <ellipse cx="0" cy="-45" rx="14" ry="9" fill="#ff97b3" opacity=".7"/>
      <circle cx="-3" cy="-45" r="1.6" fill="#7a2a3e"/>
      <circle cx="3" cy="-45" r="1.6" fill="#7a2a3e"/>
      <circle cx="-9" cy="-58" r="2.2" fill="#2b2140"/>
      <circle cx="9" cy="-58" r="2.2" fill="#2b2140"/>
      <path d="M-7 -36 q7 5 14 0" stroke="#7a2a3e" stroke-width="1.6" fill="none"/>
      <path d="M-22 -78 q-3 -10 5 -14 q9 0 8 12 z" fill="#ffadc1" opacity=".7"/>
      <path d="M22 -78 q3 -10 -5 -14 q-9 0 -8 12 z" fill="#ffadc1" opacity=".7"/>
    </g>
  </g>

  <!-- Splatter accents -->
  <g opacity=".4">
    <circle cx="50" cy="500" r="3" fill="#79a05d"/>
    <circle cx="55" cy="510" r="2" fill="#79a05d"/>
    <circle cx="555" cy="520" r="3" fill="#e87a98"/>
    <circle cx="100" cy="540" r="2.5" fill="#5683b8"/>
    <circle cx="510" cy="540" r="2.5" fill="#ffae3b"/>
  </g>

  <!-- paper grain again on top, very faint -->
  <rect width="600" height="600" filter="url(#paperW1)" opacity=".25"/>
</svg>
