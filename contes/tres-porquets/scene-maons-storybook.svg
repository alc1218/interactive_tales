<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="skyM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ed3f0"/>
      <stop offset="1" stop-color="#dceefb"/>
    </linearGradient>
    <linearGradient id="grassM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ed387"/>
      <stop offset="1" stop-color="#3d7c45"/>
    </linearGradient>
    <linearGradient id="brickWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e57858"/>
      <stop offset="1" stop-color="#a4341a"/>
    </linearGradient>
    <linearGradient id="brickRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a4341a"/>
      <stop offset="1" stop-color="#651b08"/>
    </linearGradient>
    <radialGradient id="sunM" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff7c2"/>
      <stop offset=".55" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#ffae3b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="brickPat" x="0" y="0" width="40" height="22" patternUnits="userSpaceOnUse">
      <rect width="40" height="22" fill="url(#brickWall)"/>
      <rect width="40" height="22" fill="none" stroke="#5a1d10" stroke-width="2"/>
      <rect x="20" y="11" width="40" height="22" fill="none" stroke="#5a1d10" stroke-width="2"/>
      <line x1="0" y1="11" x2="40" y2="11" stroke="#5a1d10" stroke-width="2"/>
      <ellipse cx="10" cy="6" rx="6" ry="2" fill="#fff" opacity=".15"/>
      <ellipse cx="30" cy="17" rx="6" ry="2" fill="#fff" opacity=".15"/>
    </pattern>
    <pattern id="roofTile" x="0" y="0" width="22" height="14" patternUnits="userSpaceOnUse">
      <path d="M0 14 q11 -16 22 0" fill="url(#brickRoof)" stroke="#3d0e02" stroke-width="1"/>
    </pattern>
    <filter id="softShadowM" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope=".3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#skyM)"/>

  <!-- sun -->
  <circle cx="490" cy="120" r="160" fill="url(#sunM)" opacity=".75"/>
  <circle cx="490" cy="120" r="38" fill="#fff5b3"/>
  <circle cx="490" cy="120" r="28" fill="#ffd86b"/>

  <!-- distant hills -->
  <path d="M-20 380 L120 320 L260 360 L380 305 L500 350 L620 320 L620 420 L-20 420 Z"
        fill="#7392b8" opacity=".5"/>
  <path d="M-20 405 L150 355 L300 395 L460 350 L620 390 L620 430 L-20 430 Z"
        fill="#5c7aa1" opacity=".4"/>

  <!-- clouds -->
  <g opacity=".95">
    <ellipse cx="120" cy="100" rx="50" ry="20" fill="#fff"/>
    <ellipse cx="155" cy="97" rx="34" ry="15" fill="#fff"/>
    <ellipse cx="92" cy="105" rx="28" ry="13" fill="#fff"/>
  </g>

  <!-- ground -->
  <rect x="0" y="380" width="600" height="220" fill="url(#grassM)"/>

  <!-- trees -->
  <g filter="url(#softShadowM)">
    <rect x="65" y="320" width="14" height="55" fill="#5d3a20"/>
    <ellipse cx="72" cy="310" rx="40" ry="50" fill="#3a7140"/>
    <ellipse cx="58" cy="298" rx="22" ry="22" fill="#4c8c52"/>
    <rect x="525" y="330" width="14" height="55" fill="#5d3a20"/>
    <ellipse cx="532" cy="320" rx="38" ry="46" fill="#3a7140"/>
    <ellipse cx="548" cy="307" rx="22" ry="22" fill="#4c8c52"/>
  </g>

  <!-- brick house -->
  <g filter="url(#softShadowM)">
    <!-- roof -->
    <polygon points="170,290 430,290 300,160" fill="url(#roofTile)" stroke="#3d0e02" stroke-width="2"/>
    <!-- ridge -->
    <polygon points="170,290 430,290 300,160" fill="none" stroke="#3d0e02" stroke-width="3"/>

    <!-- walls -->
    <rect x="195" y="290" width="210" height="190" fill="url(#brickPat)"/>
    <rect x="195" y="290" width="210" height="190" fill="none" stroke="#3d0e02" stroke-width="3"/>

    <!-- door -->
    <path d="M270 480 L270 380 q0 -25 30 -25 q30 0 30 25 L330 480 z" fill="#3d2410"/>
    <path d="M275 475 L275 382 q0 -20 25 -20 q25 0 25 20 L325 475 z" fill="#5d3a1c"/>
    <g stroke="#3d2410" stroke-width="1" opacity=".7">
      <line x1="280" y1="385" x2="320" y2="385"/>
      <line x1="280" y1="420" x2="320" y2="420"/>
      <line x1="280" y1="455" x2="320" y2="455"/>
    </g>
    <circle cx="318" cy="430" r="3" fill="#ffd86b"/>

    <!-- windows -->
    <rect x="215" y="320" width="40" height="40" rx="2" fill="#cfeaff" stroke="#3d0e02" stroke-width="3"/>
    <line x1="215" y1="340" x2="255" y2="340" stroke="#3d0e02" stroke-width="2"/>
    <line x1="235" y1="320" x2="235" y2="360" stroke="#3d0e02" stroke-width="2"/>
    <rect x="345" y="320" width="40" height="40" rx="2" fill="#cfeaff" stroke="#3d0e02" stroke-width="3"/>
    <line x1="345" y1="340" x2="385" y2="340" stroke="#3d0e02" stroke-width="2"/>
    <line x1="365" y1="320" x2="365" y2="360" stroke="#3d0e02" stroke-width="2"/>

    <!-- chimney -->
    <rect x="350" y="180" width="22" height="55" fill="url(#brickPat)" stroke="#3d0e02" stroke-width="2"/>
    <rect x="346" y="178" width="30" height="9" fill="#3d0e02"/>
    <g opacity=".7">
      <ellipse cx="361" cy="170" rx="6" ry="3" fill="#cfd6df"/>
      <ellipse cx="368" cy="158" rx="8" ry="4" fill="#d6dde5"/>
      <ellipse cx="358" cy="145" rx="11" ry="5" fill="#dee5ec"/>
      <ellipse cx="372" cy="130" rx="13" ry="6" fill="#e8eef3"/>
    </g>

    <!-- ivy on the wall -->
    <g fill="#3a7140" opacity=".75">
      <path d="M195 320 q-2 20 8 30 q-2 20 8 30 q-2 20 8 30"/>
      <circle cx="195" cy="350" r="5"/>
      <circle cx="200" cy="370" r="5"/>
      <circle cx="205" cy="390" r="5"/>
      <circle cx="210" cy="410" r="5"/>
      <circle cx="215" cy="430" r="5"/>
    </g>
  </g>

  <!-- brick pile / cement bucket -->
  <g transform="translate(440,440)">
    <rect x="0" y="0" width="44" height="20" fill="url(#brickPat)" stroke="#3d0e02" stroke-width="1.5"/>
    <rect x="6" y="-18" width="36" height="20" fill="url(#brickPat)" stroke="#3d0e02" stroke-width="1.5"/>
    <!-- bucket -->
    <path d="M55 0 L80 0 L77 25 L58 25 z" fill="#7a8088" stroke="#3d3a3a" stroke-width="1.5"/>
    <ellipse cx="68" cy="0" rx="13" ry="3" fill="#a8b0b8" stroke="#3d3a3a" stroke-width="1"/>
    <path d="M58 -2 q10 -10 20 0" stroke="#3d3a3a" stroke-width="1.5" fill="none"/>
    <ellipse cx="68" cy="3" rx="11" ry="2" fill="#888" opacity=".7"/>
  </g>

  <!-- piglet by door -->
  <g transform="translate(170,395)">
    <ellipse cx="0" cy="36" rx="10" ry="3" fill="#0006"/>
    <ellipse cx="0" cy="20" rx="22" ry="20" fill="#ffadc1"/>
    <circle cx="0" cy="-5" r="18" fill="#ffbfd0"/>
    <path d="M-13 -18 q-3 -8 3 -10 q7 -1 8 8 z" fill="#e89aa8"/>
    <path d="M13 -18 q3 -8 -3 -10 q-7 -1 -8 8 z" fill="#e89aa8"/>
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="#ff97b3"/>
    <circle cx="-2" cy="0" r="1.2" fill="#7a2a3e"/>
    <circle cx="2" cy="0" r="1.2" fill="#7a2a3e"/>
    <circle cx="-6" cy="-8" r="1.5" fill="#2b2140"/>
    <circle cx="6" cy="-8" r="1.5" fill="#2b2140"/>
    <path d="M-5 9 q5 4 10 0" stroke="#7a2a3e" stroke-width="1.4" fill="none"/>
  </g>

  <!-- foreground grass -->
  <g fill="#2e6e3a" opacity=".55">
    <path d="M0 575 q20 -22 38 0 q12 -18 28 0 q15 -22 30 0 z"/>
    <path d="M460 575 q18 -22 36 0 q15 -22 32 0 q15 -22 30 0 z"/>
  </g>
</svg>
