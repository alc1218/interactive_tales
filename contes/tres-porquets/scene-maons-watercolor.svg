<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <filter id="paperWM" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".7" numOctaves="2" seed="9"/>
      <feColorMatrix values="0 0 0 0 .85  0 0 0 0 .80  0 0 0 0 .65  0 0 0 .12 0"/>
    </filter>
    <filter id="bleedWM" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softBleedWM" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="600" height="600" fill="#f4eedf"/>
  <rect width="600" height="600" filter="url(#paperWM)" opacity=".5"/>

  <ellipse cx="300" cy="80" rx="500" ry="250" fill="#cfe5f0" opacity=".6" filter="url(#bleedWM)"/>
  <ellipse cx="200" cy="140" rx="300" ry="120" fill="#a8cbe0" opacity=".4" filter="url(#bleedWM)"/>
  <circle cx="490" cy="110" r="80" fill="#ffd86b" opacity=".22" filter="url(#softBleedWM)"/>
  <circle cx="490" cy="110" r="35" fill="#ffd86b" opacity=".55" filter="url(#bleedWM)"/>
  <circle cx="490" cy="110" r="25" fill="#fff5b3" opacity=".75"/>

  <ellipse cx="300" cy="540" rx="500" ry="200" fill="#a4c878" opacity=".55" filter="url(#bleedWM)"/>
  <ellipse cx="300" cy="560" rx="500" ry="120" fill="#79a05d" opacity=".4" filter="url(#bleedWM)"/>

  <path d="M-20 380 Q150 320 320 360 Q480 320 620 380 L620 420 L-20 420 Z"
        fill="#a8b8d0" opacity=".55" filter="url(#bleedWM)"/>

  <!-- trees -->
  <g opacity=".75">
    <ellipse cx="72" cy="305" rx="42" ry="50" fill="#5e8a4a" filter="url(#bleedWM)"/>
    <ellipse cx="58" cy="293" rx="22" ry="22" fill="#7ba65a" filter="url(#bleedWM)"/>
    <rect x="65" y="320" width="14" height="55" fill="#7d4f12" opacity=".6" filter="url(#bleedWM)"/>
    <ellipse cx="532" cy="315" rx="40" ry="46" fill="#5e8a4a" filter="url(#bleedWM)"/>
    <ellipse cx="548" cy="302" rx="22" ry="22" fill="#7ba65a" filter="url(#bleedWM)"/>
    <rect x="525" y="330" width="14" height="55" fill="#7d4f12" opacity=".6" filter="url(#bleedWM)"/>
  </g>

  <!-- brick house: roof wash -->
  <polygon points="170,290 430,290 300,160" fill="#a4341a" opacity=".7" filter="url(#bleedWM)"/>
  <polygon points="170,290 430,290 300,160" fill="#c14d2e" opacity=".4"/>
  <!-- horizontal tile streaks -->
  <g stroke="#651b08" stroke-width="2" opacity=".55" fill="none" filter="url(#bleedWM)">
    <path d="M180 280 q60 -45 240 0"/>
    <path d="M195 250 q50 -35 210 0"/>
    <path d="M215 220 q40 -28 170 0"/>
  </g>

  <!-- walls -->
  <rect x="195" y="290" width="210" height="190" fill="#e57858" opacity=".7" filter="url(#bleedWM)"/>
  <rect x="195" y="290" width="210" height="190" fill="#c8543a" opacity=".4"/>
  <!-- brick lines -->
  <g stroke="#651b08" stroke-width="1.5" opacity=".55" filter="url(#bleedWM)">
    <line x1="195" y1="312" x2="405" y2="312"/>
    <line x1="195" y1="334" x2="405" y2="334"/>
    <line x1="195" y1="356" x2="405" y2="356"/>
    <line x1="195" y1="378" x2="405" y2="378"/>
    <line x1="195" y1="400" x2="405" y2="400"/>
    <line x1="195" y1="422" x2="405" y2="422"/>
    <line x1="195" y1="444" x2="405" y2="444"/>
    <line x1="195" y1="466" x2="405" y2="466"/>
  </g>
  <g stroke="#651b08" stroke-width="1.5" opacity=".4">
    <line x1="240" y1="290" x2="240" y2="312"/>
    <line x1="290" y1="290" x2="290" y2="312"/>
    <line x1="340" y1="290" x2="340" y2="312"/>
    <line x1="220" y1="312" x2="220" y2="334"/>
    <line x1="270" y1="312" x2="270" y2="334"/>
    <line x1="320" y1="312" x2="320" y2="334"/>
    <line x1="370" y1="312" x2="370" y2="334"/>
  </g>

  <!-- door -->
  <path d="M270 480 L270 380 q0 -25 30 -25 q30 0 30 25 L330 480 z" fill="#3d2410" opacity=".75" filter="url(#bleedWM)"/>
  <path d="M275 475 L275 382 q0 -20 25 -20 q25 0 25 20 L325 475 z" fill="#5d3a1c" opacity=".55"/>
  <circle cx="318" cy="425" r="3" fill="#ffd86b"/>

  <!-- windows -->
  <rect x="215" y="320" width="40" height="40" fill="#cfeaff" opacity=".7" filter="url(#bleedWM)"/>
  <rect x="215" y="320" width="40" height="40" fill="none" stroke="#651b08" stroke-width="2.5" opacity=".7"/>
  <line x1="215" y1="340" x2="255" y2="340" stroke="#651b08" stroke-width="2" opacity=".5"/>
  <line x1="235" y1="320" x2="235" y2="360" stroke="#651b08" stroke-width="2" opacity=".5"/>
  <rect x="345" y="320" width="40" height="40" fill="#cfeaff" opacity=".7" filter="url(#bleedWM)"/>
  <rect x="345" y="320" width="40" height="40" fill="none" stroke="#651b08" stroke-width="2.5" opacity=".7"/>
  <line x1="345" y1="340" x2="385" y2="340" stroke="#651b08" stroke-width="2" opacity=".5"/>
  <line x1="365" y1="320" x2="365" y2="360" stroke="#651b08" stroke-width="2" opacity=".5"/>

  <!-- chimney -->
  <rect x="350" y="180" width="22" height="55" fill="#a4341a" opacity=".75" filter="url(#bleedWM)"/>
  <g opacity=".55" filter="url(#bleedWM)">
    <ellipse cx="361" cy="170" rx="6" ry="3" fill="#cfd6df"/>
    <ellipse cx="368" cy="158" rx="9" ry="5" fill="#d6dde5"/>
    <ellipse cx="358" cy="142" rx="11" ry="6" fill="#dee5ec"/>
  </g>

  <!-- ivy as soft dabs -->
  <g opacity=".7" filter="url(#bleedWM)">
    <circle cx="195" cy="350" r="6" fill="#3a7140"/>
    <circle cx="200" cy="370" r="6" fill="#5e8a4a"/>
    <circle cx="205" cy="390" r="6" fill="#3a7140"/>
    <circle cx="210" cy="410" r="6" fill="#5e8a4a"/>
    <circle cx="215" cy="430" r="6" fill="#3a7140"/>
  </g>

  <!-- splatters -->
  <g opacity=".5">
    <circle cx="180" cy="510" r="3" fill="#a4341a"/>
    <circle cx="450" cy="525" r="3" fill="#a4341a"/>
    <circle cx="100" cy="540" r="3" fill="#5683b8"/>
    <circle cx="520" cy="540" r="3" fill="#e87a98"/>
  </g>

  <rect width="600" height="600" filter="url(#paperWM)" opacity=".25"/>
</svg>
