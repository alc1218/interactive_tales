<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <pattern id="brickPatF" x="0" y="0" width="40" height="22" patternUnits="userSpaceOnUse">
      <rect width="40" height="22" fill="#e57858"/>
      <rect width="40" height="22" fill="none" stroke="#5a1d10" stroke-width="2"/>
      <rect x="20" y="11" width="40" height="22" fill="none" stroke="#5a1d10" stroke-width="2"/>
      <line x1="0" y1="11" x2="40" y2="11" stroke="#5a1d10" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="#9ed3f0"/>
  <circle cx="510" cy="100" r="240" fill="#fff5b3"/>
  <g fill="#ffe17a" opacity=".7">
    <polygon points="510,100 480,-20 540,-20"/>
    <polygon points="510,100 380,40 410,-10"/>
    <polygon points="510,100 640,40 610,-10"/>
  </g>

  <path d="M0 380 Q200 280 380 350 T 600 320 V 600 H 0 Z" fill="#3c8a8d"/>
  <path d="M0 410 Q150 340 320 400 T 600 380 V 600 H 0 Z" fill="#2a6b6e"/>
  <path d="M0 460 Q200 410 380 460 T 600 440 V 600 H 0 Z" fill="#1f4f52"/>
  <path d="M0 510 Q300 480 600 510 V 600 H 0 Z" fill="#173b3e"/>

  <g>
    <circle cx="55" cy="380" r="38" fill="#d6f0a8"/>
    <rect x="51" y="380" width="8" height="22" fill="#5d3a20"/>
    <circle cx="555" cy="385" r="35" fill="#d6f0a8"/>
    <rect x="551" y="385" width="8" height="22" fill="#5d3a20"/>
  </g>

  <!-- brick house with long shadow -->
  <g opacity=".25">
    <polygon points="170,290 430,290 430,475 360,540 200,540" fill="#173b3e" transform="translate(45,15) skewX(-12)"/>
  </g>

  <!-- roof: bold scallops -->
  <polygon points="170,290 430,290 300,160" fill="#a4341a"/>
  <polygon points="170,290 300,290 300,160" fill="#651b08" opacity=".5"/>
  <g fill="#5a1d10">
    <path d="M180 280 q12 -16 24 0 q12 -16 24 0 q12 -16 24 0 q12 -16 24 0 q12 -16 24 0 q12 -16 24 0 q12 -16 24 0 q12 -16 24 0 q12 -16 24 0" opacity=".55"/>
    <path d="M195 250 q12 -16 24 0 q12 -16 24 0 q12 -16 24 0 q12 -16 24 0 q12 -16 24 0 q12 -16 24 0 q12 -16 24 0" opacity=".4"/>
  </g>

  <!-- walls -->
  <rect x="195" y="290" width="210" height="190" fill="url(#brickPatF)"/>
  <rect x="195" y="290" width="210" height="190" fill="none" stroke="#3d0e02" stroke-width="3"/>
  <!-- door -->
  <path d="M270 480 L270 380 q0 -25 30 -25 q30 0 30 25 L330 480 z" fill="#3d2410"/>
  <path d="M270 480 L270 380 q0 -25 30 -25 L300 480 z" fill="#1d1408" opacity=".4"/>
  <circle cx="318" cy="425" r="3.5" fill="#ffd86b"/>

  <!-- windows -->
  <rect x="215" y="320" width="40" height="40" fill="#cfeaff"/>
  <rect x="215" y="320" width="40" height="40" fill="none" stroke="#3d0e02" stroke-width="3"/>
  <rect x="215" y="320" width="20" height="40" fill="#a8cbe0"/>
  <rect x="345" y="320" width="40" height="40" fill="#cfeaff"/>
  <rect x="345" y="320" width="40" height="40" fill="none" stroke="#3d0e02" stroke-width="3"/>
  <rect x="345" y="320" width="20" height="40" fill="#a8cbe0"/>

  <!-- chimney + smoke -->
  <rect x="350" y="180" width="22" height="55" fill="url(#brickPatF)" stroke="#3d0e02" stroke-width="2"/>
  <g fill="#fff" opacity=".75">
    <rect x="354" y="155" width="14" height="14" rx="7"/>
    <rect x="350" y="135" width="22" height="18" rx="9"/>
    <rect x="346" y="115" width="30" height="22" rx="11"/>
  </g>

  <!-- ivy as flat dots -->
  <g fill="#3a7140">
    <circle cx="195" cy="350" r="6"/>
    <circle cx="200" cy="370" r="6"/>
    <circle cx="205" cy="390" r="6"/>
    <circle cx="210" cy="410" r="6"/>
    <circle cx="215" cy="430" r="6"/>
  </g>

  <!-- bucket -->
  <g transform="translate(440,440)">
    <path d="M0 0 L25 0 L22 25 L3 25 z" fill="#7a8088"/>
    <path d="M0 0 L25 0 L22 25 L11 25 z" fill="#5a6068" opacity=".5"/>
    <ellipse cx="13" cy="0" rx="13" ry="3" fill="#a8b0b8" stroke="#3d3a3a" stroke-width="1.5"/>
  </g>

  <!-- piglet -->
  <g transform="translate(170,440)">
    <ellipse cx="0" cy="20" rx="22" ry="20" fill="#ffadc1"/>
    <circle cx="0" cy="-5" r="18" fill="#ffbfd0"/>
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="#ff5d80"/>
    <circle cx="-2" cy="0" r="1.2" fill="#5a1d2e"/>
    <circle cx="2" cy="0" r="1.2" fill="#5a1d2e"/>
    <circle cx="-6" cy="-8" r="1.5" fill="#1f1334"/>
    <circle cx="6" cy="-8" r="1.5" fill="#1f1334"/>
  </g>

  <g fill="#fff" opacity=".85">
    <rect x="80" y="100" width="120" height="22" rx="11"/>
  </g>
</svg>
