<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="skyFi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd5b8"/>
      <stop offset=".55" stop-color="#fff1c4"/>
      <stop offset="1" stop-color="#bfe1f5"/>
    </linearGradient>
    <linearGradient id="grassFi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ed387"/>
      <stop offset="1" stop-color="#3d7c45"/>
    </linearGradient>
    <linearGradient id="brickWallFi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e57858"/>
      <stop offset="1" stop-color="#a4341a"/>
    </linearGradient>
    <pattern id="brickPatFi" x="0" y="0" width="40" height="22" patternUnits="userSpaceOnUse">
      <rect width="40" height="22" fill="url(#brickWallFi)"/>
      <rect width="40" height="22" fill="none" stroke="#5a1d10" stroke-width="2"/>
      <rect x="20" y="11" width="40" height="22" fill="none" stroke="#5a1d10" stroke-width="2"/>
      <line x1="0" y1="11" x2="40" y2="11" stroke="#5a1d10" stroke-width="2"/>
      <ellipse cx="10" cy="6" rx="6" ry="2" fill="#fff" opacity=".15"/>
      <ellipse cx="30" cy="17" rx="6" ry="2" fill="#fff" opacity=".15"/>
    </pattern>
    <linearGradient id="brickRoofFi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a4341a"/>
      <stop offset="1" stop-color="#651b08"/>
    </linearGradient>
    <pattern id="roofTileFi" x="0" y="0" width="22" height="14" patternUnits="userSpaceOnUse">
      <path d="M0 14 q11 -16 22 0" fill="url(#brickRoofFi)" stroke="#3d0e02" stroke-width="1"/>
    </pattern>
    <radialGradient id="sunFi" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff7c2"/>
      <stop offset=".55" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#ffae3b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pigHeadFi" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#ffe1e8"/>
      <stop offset=".75" stop-color="#ffbfd0"/>
      <stop offset="1" stop-color="#e88aaa"/>
    </radialGradient>
    <filter id="softShadowFi" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope=".3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#skyFi)"/>

  <!-- sun -->
  <circle cx="490" cy="120" r="160" fill="url(#sunFi)" opacity=".8"/>
  <circle cx="490" cy="120" r="40" fill="#fff5b3"/>
  <circle cx="490" cy="120" r="30" fill="#ffd86b"/>
  <!-- sun rays -->
  <g stroke="#ffd86b" stroke-width="3" stroke-linecap="round" opacity=".55">
    <line x1="490" y1="50" x2="490" y2="30"/>
    <line x1="560" y1="120" x2="585" y2="120"/>
    <line x1="540" y1="70" x2="555" y2="55"/>
    <line x1="440" y1="70" x2="425" y2="55"/>
  </g>

  <!-- distant hills -->
  <path d="M-20 380 L120 320 L260 360 L380 305 L500 350 L620 320 L620 420 L-20 420 Z"
        fill="#7392b8" opacity=".5"/>
  <path d="M-20 405 L150 355 L300 395 L460 350 L620 390 L620 430 L-20 430 Z"
        fill="#5c7aa1" opacity=".4"/>

  <!-- ground -->
  <rect x="0" y="380" width="600" height="220" fill="url(#grassFi)"/>

  <!-- trees -->
  <g filter="url(#softShadowFi)">
    <rect x="65" y="320" width="14" height="55" fill="#5d3a20"/>
    <ellipse cx="72" cy="310" rx="40" ry="50" fill="#3a7140"/>
    <ellipse cx="58" cy="298" rx="22" ry="22" fill="#4c8c52"/>
    <rect x="525" y="330" width="14" height="55" fill="#5d3a20"/>
    <ellipse cx="532" cy="320" rx="38" ry="46" fill="#3a7140"/>
    <ellipse cx="548" cy="307" rx="22" ry="22" fill="#4c8c52"/>
  </g>

  <!-- brick house, large, centered -->
  <g filter="url(#softShadowFi)">
    <polygon points="130,290 470,290 300,140" fill="url(#roofTileFi)" stroke="#3d0e02" stroke-width="2"/>
    <polygon points="130,290 470,290 300,140" fill="none" stroke="#3d0e02" stroke-width="3"/>
    <rect x="160" y="290" width="280" height="200" fill="url(#brickPatFi)"/>
    <rect x="160" y="290" width="280" height="200" fill="none" stroke="#3d0e02" stroke-width="3"/>

    <!-- door -->
    <path d="M260 490 L260 390 q0 -28 40 -28 q40 0 40 28 L340 490 z" fill="#3d2410"/>
    <path d="M268 484 L268 392 q0 -22 32 -22 q32 0 32 22 L332 484 z" fill="#5d3a1c"/>
    <g stroke="#3d2410" stroke-width="1" opacity=".7">
      <line x1="275" y1="395" x2="325" y2="395"/>
      <line x1="275" y1="430" x2="325" y2="430"/>
      <line x1="275" y1="465" x2="325" y2="465"/>
    </g>
    <circle cx="328" cy="438" r="3.5" fill="#ffd86b"/>

    <!-- 3 windows showing pigs inside -->
    <g>
      <!-- window 1 -->
      <rect x="180" y="320" width="55" height="55" rx="3" fill="#a8d5f0" stroke="#3d0e02" stroke-width="3"/>
      <line x1="180" y1="347" x2="235" y2="347" stroke="#3d0e02" stroke-width="2"/>
      <line x1="207" y1="320" x2="207" y2="375" stroke="#3d0e02" stroke-width="2"/>
      <!-- pig 1 -->
      <g transform="translate(207,360)">
        <circle cx="0" cy="0" r="22" fill="url(#pigHeadFi)"/>
        <path d="M-15 -16 q-3 -10 4 -12 q8 -1 8 10 z" fill="#e89aa8"/>
        <path d="M15 -16 q3 -10 -4 -12 q-8 -1 -8 10 z" fill="#e89aa8"/>
        <ellipse cx="0" cy="6" rx="9" ry="6" fill="#ff97b3"/>
        <circle cx="-2.5" cy="6" r="1.4" fill="#7a2a3e"/>
        <circle cx="2.5" cy="6" r="1.4" fill="#7a2a3e"/>
        <circle cx="-7" cy="-3" r="2" fill="#fff"/>
        <circle cx="-6.5" cy="-3" r="1.2" fill="#2b2140"/>
        <circle cx="7" cy="-3" r="2" fill="#fff"/>
        <circle cx="7.5" cy="-3" r="1.2" fill="#2b2140"/>
        <path d="M-6 13 q6 5 12 0" stroke="#7a2a3e" stroke-width="1.6" fill="none" stroke-linecap="round"/>
        <circle cx="-15" cy="6" r="3.5" fill="#ff9bb5" opacity=".55"/>
        <circle cx="15" cy="6" r="3.5" fill="#ff9bb5" opacity=".55"/>
      </g>

      <!-- window 2 -->
      <rect x="365" y="320" width="55" height="55" rx="3" fill="#a8d5f0" stroke="#3d0e02" stroke-width="3"/>
      <line x1="365" y1="347" x2="420" y2="347" stroke="#3d0e02" stroke-width="2"/>
      <line x1="392" y1="320" x2="392" y2="375" stroke="#3d0e02" stroke-width="2"/>
      <g transform="translate(392,360)">
        <circle cx="0" cy="0" r="22" fill="url(#pigHeadFi)"/>
        <path d="M-15 -16 q-3 -10 4 -12 q8 -1 8 10 z" fill="#e89aa8"/>
        <path d="M15 -16 q3 -10 -4 -12 q-8 -1 -8 10 z" fill="#e89aa8"/>
        <ellipse cx="0" cy="6" rx="9" ry="6" fill="#ff97b3"/>
        <circle cx="-2.5" cy="6" r="1.4" fill="#7a2a3e"/>
        <circle cx="2.5" cy="6" r="1.4" fill="#7a2a3e"/>
        <circle cx="-7" cy="-3" r="2" fill="#fff"/>
        <circle cx="-6.5" cy="-3" r="1.2" fill="#2b2140"/>
        <circle cx="7" cy="-3" r="2" fill="#fff"/>
        <circle cx="7.5" cy="-3" r="1.2" fill="#2b2140"/>
        <path d="M-6 13 q6 5 12 0" stroke="#7a2a3e" stroke-width="1.6" fill="none" stroke-linecap="round"/>
        <circle cx="-15" cy="6" r="3.5" fill="#ff9bb5" opacity=".55"/>
        <circle cx="15" cy="6" r="3.5" fill="#ff9bb5" opacity=".55"/>
      </g>

      <!-- chimney window with pig -->
      <rect x="270" y="220" width="60" height="55" rx="3" fill="#a8d5f0" stroke="#3d0e02" stroke-width="3"/>
      <line x1="270" y1="248" x2="330" y2="248" stroke="#3d0e02" stroke-width="2"/>
      <line x1="300" y1="220" x2="300" y2="275" stroke="#3d0e02" stroke-width="2"/>
      <g transform="translate(300,260)">
        <circle cx="0" cy="0" r="22" fill="url(#pigHeadFi)"/>
        <path d="M-15 -16 q-3 -10 4 -12 q8 -1 8 10 z" fill="#e89aa8"/>
        <path d="M15 -16 q3 -10 -4 -12 q-8 -1 -8 10 z" fill="#e89aa8"/>
        <ellipse cx="0" cy="6" rx="9" ry="6" fill="#ff97b3"/>
        <circle cx="-2.5" cy="6" r="1.4" fill="#7a2a3e"/>
        <circle cx="2.5" cy="6" r="1.4" fill="#7a2a3e"/>
        <circle cx="-7" cy="-3" r="2" fill="#fff"/>
        <circle cx="-6.5" cy="-3" r="1.2" fill="#2b2140"/>
        <circle cx="7" cy="-3" r="2" fill="#fff"/>
        <circle cx="7.5" cy="-3" r="1.2" fill="#2b2140"/>
        <path d="M-6 13 q6 5 12 0" stroke="#7a2a3e" stroke-width="1.6" fill="none" stroke-linecap="round"/>
        <circle cx="-15" cy="6" r="3.5" fill="#ff9bb5" opacity=".55"/>
        <circle cx="15" cy="6" r="3.5" fill="#ff9bb5" opacity=".55"/>
      </g>
    </g>

    <!-- cozy chimney with smoke -->
    <rect x="380" y="170" width="22" height="55" fill="url(#brickPatFi)" stroke="#3d0e02" stroke-width="2"/>
    <rect x="376" y="168" width="30" height="9" fill="#3d0e02"/>
    <g opacity=".75">
      <ellipse cx="391" cy="158" rx="6" ry="3" fill="#cfd6df"/>
      <ellipse cx="398" cy="146" rx="8" ry="4" fill="#d6dde5"/>
      <ellipse cx="388" cy="132" rx="10" ry="5" fill="#dee5ec"/>
      <ellipse cx="402" cy="115" rx="13" ry="6" fill="#e8eef3"/>
    </g>
  </g>

  <!-- celebratory confetti -->
  <g>
    <rect x="100" y="180" width="6" height="12" fill="#ff5a7e" transform="rotate(20 103 186)"/>
    <rect x="170" y="120" width="6" height="12" fill="#5683b8" transform="rotate(-15 173 126)"/>
    <rect x="220" y="170" width="6" height="12" fill="#ffae3b" transform="rotate(40 223 176)"/>
    <rect x="380" y="100" width="6" height="12" fill="#ff5a7e" transform="rotate(-25 383 106)"/>
    <rect x="450" y="150" width="6" height="12" fill="#52c280" transform="rotate(15 453 156)"/>
    <rect x="510" y="220" width="6" height="12" fill="#ffae3b" transform="rotate(-30 513 226)"/>
    <circle cx="80" cy="240" r="4" fill="#ffd86b"/>
    <circle cx="540" cy="280" r="4" fill="#ff5a7e"/>
    <circle cx="60" cy="320" r="4" fill="#5683b8"/>
  </g>

  <!-- "Segurs!" banner -->
  <g transform="translate(300,80)">
    <rect x="-110" y="-25" width="220" height="50" rx="25" fill="#ff5a7e" filter="url(#softShadowFi)"/>
    <text x="0" y="9" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="28" font-weight="800" fill="#fff">Segurs!</text>
  </g>

  <!-- foreground grass -->
  <g fill="#2e6e3a" opacity=".55">
    <path d="M0 575 q20 -22 38 0 q12 -18 28 0 q15 -22 30 0 z"/>
    <path d="M460 575 q18 -22 36 0 q15 -22 32 0 q15 -22 30 0 z"/>
  </g>
  <g>
    <g transform="translate(150,540)"><circle r="4" fill="#fff7c2"/><circle r="1.6" fill="#ffae3b"/></g>
    <g transform="translate(450,545)"><circle r="4" fill="#ffd0e0"/><circle r="1.6" fill="#e87a98"/></g>
  </g>
</svg>
