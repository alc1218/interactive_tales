<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <!-- modern flat -->
  <rect width="600" height="600" fill="#fcc36e"/>
  <!-- big sun circle -->
  <circle cx="510" cy="100" r="240" fill="#ff8a5b"/>
  <!-- sky panel -->
  <rect width="600" height="380" fill="#fcc36e" opacity="0"/>

  <!-- abstract layered hills -->
  <path d="M0 380 Q200 280 380 350 T 600 320 V 600 H 0 Z" fill="#3c8a8d"/>
  <path d="M0 410 Q150 340 320 400 T 600 380 V 600 H 0 Z" fill="#2a6b6e"/>
  <path d="M0 460 Q200 410 380 460 T 600 440 V 600 H 0 Z" fill="#1f4f52"/>

  <!-- foreground meadow -->
  <path d="M0 510 Q300 480 600 510 V 600 H 0 Z" fill="#173b3e"/>

  <!-- sun rays as bold triangles -->
  <g fill="#ffe17a">
    <polygon points="510,100 480,-20 540,-20" opacity=".7"/>
    <polygon points="510,100 380,40 410,-10" opacity=".5"/>
    <polygon points="510,100 640,40 610,-10" opacity=".5"/>
  </g>

  <!-- distant simple trees -->
  <g>
    <circle cx="50" cy="395" r="35" fill="#d6f0a8"/>
    <rect x="46" y="395" width="8" height="22" fill="#5d3a20"/>
    <circle cx="555" cy="390" r="30" fill="#d6f0a8"/>
    <rect x="551" y="390" width="8" height="22" fill="#5d3a20"/>
  </g>

  <!-- 3 piglets — flat geometric -->
  <g>
    <!-- piglet 1 -->
    <g transform="translate(115,400)">
      <ellipse cx="0" cy="80" rx="55" ry="10" fill="#173b3e" opacity=".4"/>
      <rect x="-22" y="50" width="14" height="30" rx="3" fill="#ff8aa3"/>
      <rect x="8" y="50" width="14" height="30" rx="3" fill="#ff8aa3"/>
      <ellipse cx="0" cy="40" rx="55" ry="42" fill="#ffadc1"/>
      <ellipse cx="-15" cy="55" rx="55" ry="42" fill="#ff8aa3" opacity=".35"/>
      <circle cx="0" cy="-10" r="40" fill="#ffbfd0"/>
      <circle cx="-12" cy="0" r="40" fill="#ff8aa3" opacity=".25"/>
      <ellipse cx="0" cy="0" rx="16" ry="11" fill="#ff5d80"/>
      <ellipse cx="-4" cy="0" rx="2.5" ry="3.5" fill="#5a1d2e"/>
      <ellipse cx="4" cy="0" rx="2.5" ry="3.5" fill="#5a1d2e"/>
      <circle cx="-12" cy="-15" r="3" fill="#1f1334"/>
      <circle cx="12" cy="-15" r="3" fill="#1f1334"/>
      <path d="M-8 18 q8 6 16 0" stroke="#5a1d2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M-26 -27 q-5 -16 6 -20 q14 -2 16 18 z" fill="#ff8aa3"/>
      <path d="M26 -27 q5 -16 -6 -20 q-14 -2 -16 18 z" fill="#ff8aa3"/>
    </g>
    <!-- piglet 2 (slightly bigger middle) -->
    <g transform="translate(300,390)">
      <ellipse cx="0" cy="90" rx="60" ry="12" fill="#173b3e" opacity=".4"/>
      <rect x="-25" y="55" width="14" height="35" rx="3" fill="#ff8aa3"/>
      <rect x="11" y="55" width="14" height="35" rx="3" fill="#ff8aa3"/>
      <ellipse cx="0" cy="45" rx="60" ry="46" fill="#ffadc1"/>
      <ellipse cx="-16" cy="60" rx="60" ry="46" fill="#ff8aa3" opacity=".35"/>
      <circle cx="0" cy="-10" r="44" fill="#ffbfd0"/>
      <circle cx="-12" cy="0" r="44" fill="#ff8aa3" opacity=".25"/>
      <ellipse cx="0" cy="0" rx="18" ry="12" fill="#ff5d80"/>
      <ellipse cx="-5" cy="0" rx="2.8" ry="3.8" fill="#5a1d2e"/>
      <ellipse cx="5" cy="0" rx="2.8" ry="3.8" fill="#5a1d2e"/>
      <circle cx="-13" cy="-16" r="3.5" fill="#1f1334"/>
      <circle cx="13" cy="-16" r="3.5" fill="#1f1334"/>
      <path d="M-9 20 q9 6 18 0" stroke="#5a1d2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M-28 -29 q-5 -18 6 -22 q14 -2 16 20 z" fill="#ff8aa3"/>
      <path d="M28 -29 q5 -18 -6 -22 q-14 -2 -16 20 z" fill="#ff8aa3"/>
    </g>
    <!-- piglet 3 -->
    <g transform="translate(485,400)">
      <ellipse cx="0" cy="80" rx="55" ry="10" fill="#173b3e" opacity=".4"/>
      <rect x="-22" y="50" width="14" height="30" rx="3" fill="#ff8aa3"/>
      <rect x="8" y="50" width="14" height="30" rx="3" fill="#ff8aa3"/>
      <ellipse cx="0" cy="40" rx="55" ry="42" fill="#ffadc1"/>
      <ellipse cx="-15" cy="55" rx="55" ry="42" fill="#ff8aa3" opacity=".35"/>
      <circle cx="0" cy="-10" r="40" fill="#ffbfd0"/>
      <circle cx="-12" cy="0" r="40" fill="#ff8aa3" opacity=".25"/>
      <ellipse cx="0" cy="0" rx="16" ry="11" fill="#ff5d80"/>
      <ellipse cx="-4" cy="0" rx="2.5" ry="3.5" fill="#5a1d2e"/>
      <ellipse cx="4" cy="0" rx="2.5" ry="3.5" fill="#5a1d2e"/>
      <circle cx="-12" cy="-15" r="3" fill="#1f1334"/>
      <circle cx="12" cy="-15" r="3" fill="#1f1334"/>
      <path d="M-8 18 q8 6 16 0" stroke="#5a1d2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M-26 -27 q-5 -16 6 -20 q14 -2 16 18 z" fill="#ff8aa3"/>
      <path d="M26 -27 q5 -16 -6 -20 q-14 -2 -16 18 z" fill="#ff8aa3"/>
    </g>
  </g>

  <!-- abstract clouds as half-pills -->
  <g fill="#fff" opacity=".85">
    <rect x="80" y="80" width="120" height="22" rx="11"/>
    <rect x="320" y="50" width="100" height="20" rx="10"/>
  </g>

  <!-- ground accents (geometric tufts) -->
  <g fill="#0d2426">
    <circle cx="60" cy="555" r="5"/>
    <circle cx="540" cy="565" r="5"/>
    <circle cx="200" cy="570" r="4"/>
    <circle cx="400" cy="572" r="4"/>
    <circle cx="100" cy="575" r="3"/>
    <circle cx="500" cy="580" r="3"/>
  </g>
</svg>
