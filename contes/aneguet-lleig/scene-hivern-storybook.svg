<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="skyA3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a8aa8"/>
      <stop offset="1" stop-color="#c8d4e0"/>
    </linearGradient>
    <linearGradient id="snowA3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#c8d8e8"/>
    </linearGradient>
    <linearGradient id="trunkA3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a3a28"/>
      <stop offset="1" stop-color="#2a1a10"/>
    </linearGradient>
    <radialGradient id="grayDuckA3" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#c8c8d0"/>
      <stop offset="1" stop-color="#5a5a68"/>
    </radialGradient>
    <filter id="softShadowA3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#skyA3)"/>

  <!-- pale sun behind clouds -->
  <circle cx="450" cy="120" r="40" fill="#e8e0d0" opacity=".6"/>

  <!-- distant snowy mountains -->
  <path d="M-20 380 L80 280 L160 340 L260 260 L350 320 L470 240 L620 320 L620 400 L-20 400 Z" fill="#a0aec0" opacity=".5"/>
  <path d="M250 270 L260 260 L275 285 Z" fill="#fff" opacity=".8"/>
  <path d="M460 250 L470 240 L482 265 Z" fill="#fff" opacity=".8"/>

  <!-- snow ground -->
  <ellipse cx="300" cy="540" rx="600" ry="200" fill="url(#snowA3)"/>

  <!-- bare leafless tree -->
  <g filter="url(#softShadowA3)" transform="translate(300,250)">
    <rect x="-12" y="0" width="24" height="220" fill="url(#trunkA3)"/>
    <!-- branches -->
    <path d="M0 30 q-50 -20 -80 -50" stroke="#3a2a18" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M0 60 q50 -10 90 -40" stroke="#3a2a18" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M-30 50 q-30 -10 -45 -30" stroke="#3a2a18" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M30 80 q40 -10 60 -25" stroke="#3a2a18" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0 0 q-20 -30 -40 -45" stroke="#3a2a18" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M0 0 q20 -30 40 -45" stroke="#3a2a18" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- twigs -->
    <line x1="-65" y1="-10" x2="-80" y2="-25" stroke="#3a2a18" stroke-width="2"/>
    <line x1="65" y1="-10" x2="80" y2="-25" stroke="#3a2a18" stroke-width="2"/>
    <!-- snow on branches -->
    <path d="M-50 -10 q15 -8 30 -2" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M30 -10 q15 -5 30 0" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- snow drift around tree -->
  <ellipse cx="300" cy="490" rx="120" ry="18" fill="#fff"/>

  <!-- Lonely gray duckling -->
  <g filter="url(#softShadowA3)" transform="translate(300,480)">
    <ellipse cx="0" cy="30" rx="42" ry="6" fill="#0006"/>
    <ellipse cx="0" cy="0" rx="38" ry="30" fill="url(#grayDuckA3)"/>
    <ellipse cx="-3" cy="0" rx="22" ry="16" fill="#5a5a68"/>
    <!-- head -->
    <circle cx="20" cy="-22" r="18" fill="url(#grayDuckA3)"/>
    <!-- beak -->
    <path d="M33 -22 L44 -23 L44 -16 L33 -16 z" fill="#c08020"/>
    <!-- sad eye -->
    <circle cx="22" cy="-26" r="2.5" fill="#fff"/>
    <circle cx="22" cy="-26" r="1.4" fill="#2b2140"/>
    <!-- frown -->
    <path d="M30 -12 q5 -3 10 -1" stroke="#3a2a18" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- feet -->
    <ellipse cx="-8" cy="25" rx="5" ry="3" fill="#c08020"/>
    <ellipse cx="8" cy="25" rx="5" ry="3" fill="#c08020"/>
  </g>

  <!-- falling snowflakes -->
  <g fill="#fff">
    <circle cx="80" cy="100" r="3"/>
    <circle cx="150" cy="180" r="2.5"/>
    <circle cx="230" cy="80" r="3"/>
    <circle cx="320" cy="160" r="2.5"/>
    <circle cx="420" cy="100" r="3"/>
    <circle cx="500" cy="180" r="2.5"/>
    <circle cx="60" cy="280" r="2.5"/>
    <circle cx="180" cy="320" r="3"/>
    <circle cx="380" cy="280" r="2.5"/>
    <circle cx="500" cy="350" r="3"/>
    <circle cx="120" cy="400" r="2"/>
    <circle cx="450" cy="420" r="2.5"/>
    <circle cx="220" cy="200" r="2"/>
    <circle cx="540" cy="240" r="2"/>
    <circle cx="80" cy="350" r="2"/>
  </g>
  <!-- snowflake stars -->
  <g stroke="#fff" stroke-width="1" fill="none">
    <g transform="translate(150,180)"><line x1="-5" y1="0" x2="5" y2="0"/><line x1="0" y1="-5" x2="0" y2="5"/><line x1="-3" y1="-3" x2="3" y2="3"/><line x1="-3" y1="3" x2="3" y2="-3"/></g>
    <g transform="translate(420,100)"><line x1="-5" y1="0" x2="5" y2="0"/><line x1="0" y1="-5" x2="0" y2="5"/><line x1="-3" y1="-3" x2="3" y2="3"/><line x1="-3" y1="3" x2="3" y2="-3"/></g>
    <g transform="translate(180,320)"><line x1="-5" y1="0" x2="5" y2="0"/><line x1="0" y1="-5" x2="0" y2="5"/></g>
  </g>
</svg>
