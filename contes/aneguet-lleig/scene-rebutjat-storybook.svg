<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="skyA2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8d8eb"/>
      <stop offset="1" stop-color="#dde9c0"/>
    </linearGradient>
    <linearGradient id="grassA2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9bd884"/>
      <stop offset="1" stop-color="#3d8a4c"/>
    </linearGradient>
    <radialGradient id="pondA2" cx=".5" cy=".5" r=".7">
      <stop offset="0" stop-color="#a8d4e8"/>
      <stop offset="1" stop-color="#3a6a8a"/>
    </radialGradient>
    <radialGradient id="grayDuckA2" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#c8c8d0"/>
      <stop offset="1" stop-color="#6a6a78"/>
    </radialGradient>
    <radialGradient id="ducklingA2" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#fff5b3"/>
      <stop offset="1" stop-color="#d8a040"/>
    </radialGradient>
    <radialGradient id="cloudA2" cx=".5" cy=".4" r=".55">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dde9f2"/>
    </radialGradient>
    <filter id="softShadowA2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#skyA2)"/>

  <g filter="url(#softShadowA2)">
    <ellipse cx="120" cy="100" rx="50" ry="18" fill="url(#cloudA2)"/>
    <ellipse cx="450" cy="120" rx="45" ry="16" fill="url(#cloudA2)"/>
  </g>

  <g opacity=".55">
    <ellipse cx="60" cy="350" rx="35" ry="40" fill="#3a7140"/>
    <ellipse cx="540" cy="345" rx="40" ry="45" fill="#4c8c52"/>
  </g>

  <!-- meadow -->
  <ellipse cx="300" cy="500" rx="600" ry="200" fill="url(#grassA2)"/>

  <!-- pond -->
  <ellipse cx="300" cy="450" rx="280" ry="60" fill="url(#pondA2)"/>
  <g stroke="#fff" stroke-width="1.5" fill="none" opacity=".5">
    <path d="M150 440 q40 5 80 0"/>
    <path d="M380 460 q40 -5 80 0"/>
  </g>

  <!-- Ugly duckling alone (left) -->
  <g filter="url(#softShadowA2)" transform="translate(140,400)">
    <ellipse cx="0" cy="60" rx="40" ry="6" fill="#0006"/>
    <!-- body -->
    <ellipse cx="0" cy="20" rx="38" ry="32" fill="url(#grayDuckA2)"/>
    <!-- wing -->
    <ellipse cx="-5" cy="20" rx="22" ry="16" fill="#7a7a88"/>
    <!-- head bowed -->
    <circle cx="20" cy="-10" r="20" fill="url(#grayDuckA2)"/>
    <!-- beak -->
    <path d="M35 -8 L48 -10 L48 0 L35 0 z" fill="#ff9b3b"/>
    <!-- sad eye -->
    <circle cx="22" cy="-12" r="2.8" fill="#fff"/>
    <circle cx="22" cy="-12" r="1.6" fill="#2b2140"/>
    <!-- tear drop -->
    <path d="M22 -7 q-2 5 0 8 q2 -3 0 -8 z" fill="#5ec0e8"/>
    <!-- frown -->
    <path d="M30 5 q5 -3 12 -1" stroke="#5d2a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- feet on water -->
    <ellipse cx="-10" cy="55" rx="6" ry="3" fill="#ff9b3b"/>
    <ellipse cx="10" cy="55" rx="6" ry="3" fill="#ff9b3b"/>
  </g>

  <!-- Group of 4 yellow ducklings (right) -->
  <g filter="url(#softShadowA2)" transform="translate(380,420)">
    <!-- duckling 1 -->
    <g transform="translate(0,0)">
      <ellipse cx="0" cy="40" rx="28" ry="6" fill="#0006"/>
      <ellipse cx="0" cy="10" rx="25" ry="22" fill="url(#ducklingA2)"/>
      <circle cx="15" cy="-10" r="14" fill="url(#ducklingA2)"/>
      <path d="M25 -10 L36 -11 L36 -3 L25 -3 z" fill="#ff9b3b"/>
      <circle cx="14" cy="-12" r="2" fill="#fff"/>
      <circle cx="14" cy="-12" r="1.2" fill="#2b2140"/>
      <!-- laughing/open beak -->
      <path d="M25 -7 L34 -5 L25 -3 z" fill="#a06414"/>
    </g>
    <g transform="translate(50,5)">
      <ellipse cx="0" cy="40" rx="28" ry="6" fill="#0006"/>
      <ellipse cx="0" cy="10" rx="25" ry="22" fill="url(#ducklingA2)"/>
      <circle cx="-15" cy="-10" r="14" fill="url(#ducklingA2)"/>
      <path d="M-25 -10 L-36 -11 L-36 -3 L-25 -3 z" fill="#ff9b3b"/>
      <circle cx="-14" cy="-12" r="2" fill="#fff"/>
      <circle cx="-14" cy="-12" r="1.2" fill="#2b2140"/>
      <path d="M-25 -7 L-34 -5 L-25 -3 z" fill="#a06414"/>
    </g>
    <g transform="translate(110,0)">
      <ellipse cx="0" cy="40" rx="28" ry="6" fill="#0006"/>
      <ellipse cx="0" cy="10" rx="25" ry="22" fill="url(#ducklingA2)"/>
      <circle cx="15" cy="-10" r="14" fill="url(#ducklingA2)"/>
      <path d="M25 -10 L36 -11 L36 -3 L25 -3 z" fill="#ff9b3b"/>
      <circle cx="14" cy="-12" r="2" fill="#fff"/>
      <circle cx="14" cy="-12" r="1.2" fill="#2b2140"/>
      <path d="M25 -7 L34 -5 L25 -3 z" fill="#a06414"/>
    </g>
    <g transform="translate(160,8)">
      <ellipse cx="0" cy="40" rx="28" ry="6" fill="#0006"/>
      <ellipse cx="0" cy="10" rx="25" ry="22" fill="url(#ducklingA2)"/>
      <circle cx="-15" cy="-10" r="14" fill="url(#ducklingA2)"/>
      <path d="M-25 -10 L-36 -11 L-36 -3 L-25 -3 z" fill="#ff9b3b"/>
      <circle cx="-14" cy="-12" r="2" fill="#fff"/>
      <circle cx="-14" cy="-12" r="1.2" fill="#2b2140"/>
      <path d="M-25 -7 L-34 -5 L-25 -3 z" fill="#a06414"/>
    </g>
  </g>

  <!-- mocking sound bubble -->
  <g filter="url(#softShadowA2)">
    <ellipse cx="450" cy="320" rx="60" ry="22" fill="#fff"/>
    <path d="M430 340 L420 360 L450 348 z" fill="#fff"/>
    <text x="450" y="326" text-anchor="middle" font-family="Georgia" font-size="16" fill="#a3192a" font-style="italic" font-weight="bold">Ha ha ha!</text>
  </g>

  <g fill="#2e6e3a" opacity=".55">
    <path d="M0 580 q20 -22 38 0 q12 -18 28 0 q15 -22 30 0 z"/>
    <path d="M460 580 q18 -22 36 0 q15 -22 32 0 q15 -22 30 0 z"/>
  </g>
</svg>
