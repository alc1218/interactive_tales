    <path d="M10 290 Q40 285 70 290 Q100 295 130 290 Q160 285 190 290 Q220 295 250 290 Q280 285 295 290"/>
    <path d="M10 320 Q40 315 70 320 Q100 325 130 320 Q160 315 190 320 Q220 325 250 320 Q280 315 295 320"/>
