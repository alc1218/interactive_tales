<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#dfeeff"/>
  <rect x="0" y="200" width="300" height="100" fill="#a5cfff"/>
  <!-- snowflakes -->
  <g fill="#fff" opacity=".9"><circle cx="30" cy="30" r="2"/><circle cx="80" cy="50" r="2"/><circle cx="150" cy="30" r="2"/><circle cx="220" cy="55" r="2"/><circle cx="270" cy="30" r="2"/><circle cx="50" cy="90" r="1.5"/><circle cx="250" cy="120" r="1.5"/></g>
  <!-- bare tree -->
  <g transform="translate(30,100)">
    <rect x="30" y="90" width="12" height="90" fill="#8a5a2a"/>
    <line x1="36" y1="90" x2="20" y2="60" stroke="#8a5a2a" stroke-width="4"/>
    <line x1="36" y1="90" x2="55" y2="55" stroke="#8a5a2a" stroke-width="4"/>
    <line x1="36" y1="100" x2="10" y2="95" stroke="#8a5a2a" stroke-width="3"/>
  </g>
  <!-- lonely duckling -->
  <g transform="translate(150,170)">
    <ellipse cx="35" cy="55" rx="35" ry="20" fill="#b8b8c8"/>
    <circle cx="65" cy="45" r="18" fill="#b8b8c8"/>
    <polygon points="75,45 92,48 75,55" fill="#ff9a3c"/>
    <circle cx="68" cy="42" r="1.5" fill="#2b2140"/>
    <path d="M60 52 Q64 55 70 52" stroke="#2b2140" stroke-width="1" fill="none"/>
  </g>
</svg>
