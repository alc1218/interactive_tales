    <circle cx="42" cy="35" r="1.5" fill="#2b2140"/><circle cx="58" cy="35" r="1.5" fill="#2b2140"/>
    <path d="M42 44 Q50 48 58 44" stroke="#d93048" stroke-width="1" fill="none"/>
    <!-- slipper -->
    <ellipse cx="50" cy="118" rx="16" ry="5" fill="#cfe6ff" stroke="#6a9bff" stroke-width="1.2"/>
  </g>
