<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4a3f8a"/><stop offset="1" stop-color="#8a6ab5"/></linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#sky)"/>
  <!-- stars -->
  <g fill="#fff8d6"><circle cx="40" cy="50" r="1.5"/><circle cx="70" cy="30" r="1"/><circle cx="250" cy="40" r="1.5"/><circle cx="270" cy="80" r="1"/><circle cx="30" cy="110" r="1"/></g>
  <circle cx="60" cy="80" r="22" fill="#fffbe8" opacity=".9"/>
  <!-- castle silhouette -->
  <g fill="#3a2f6a">
    <rect x="0" y="290" width="300" height="60"/>
    <rect x="180" y="220" width="80" height="80"/>
    <polygon points="180,220 260,220 220,180" fill="#3a2f6a"/>
  </g>
  <ellipse cx="150" cy="370" rx="260" ry="30" fill="#2e2556"/>
  <!-- Cinderella -->
  <g transform="translate(100,170)">
    <path d="M0 100 Q50 160 100 100 L95 180 L5 180 Z" fill="#a5cfff"/>
    <!-- body top -->
    <rect x="30" y="60" width="40" height="55" fill="#cfe6ff" rx="10"/>
    <!-- head -->
    <circle cx="50" cy="40" r="25" fill="#ffd9c0"/>
    <!-- hair -->
    <path d="M25 30 Q50 0 75 30 L75 55 Q50 65 25 55 Z" fill="#ffd86b"/>
    <!-- eyes -->
    <circle cx="42" cy="42" r="2" fill="#2b2140"/><circle cx="58" cy="42" r="2" fill="#2b2140"/>
    <path d="M42 52 Q50 56 58 52" stroke="#d93048" stroke-width="1.5" fill="none"/>
    <!-- crown -->
    <polygon points="38,12 42,5 48,12 54,5 60,12 62,18 38,18" fill="#ffd86b" stroke="#c08a1f" stroke-width="1"/>
  </g>
  <!-- glass slipper highlight -->
  <g transform="translate(130,330)">
    <ellipse cx="20" cy="15" rx="20" ry="8" fill="#cfe6ff" opacity=".8"/>
  </g>
  <text x="150" y="50" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="28" font-weight="800" fill="#fff8d6">La Ventafocs</text>
</svg>
