<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" preserveAspectRatio="xMidYMid slice">
  <defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe6ea"/><stop offset="1" stop-color="#fff5e6"/></linearGradient></defs>
  <rect width="300" height="400" fill="url(#sky)"/>
  <!-- stairs -->
  <g fill="#c9a26b" stroke="#8a5a2a" stroke-width="2">
    <rect x="30" y="340" width="260" height="20"/>
    <rect x="50" y="320" width="220" height="20"/>
    <rect x="70" y="300" width="180" height="20"/>
  </g>
  <!-- mouse -->
  <g transform="translate(100,180)">
    <ellipse cx="50" cy="80" rx="50" ry="40" fill="#d8c4a4"/>
    <circle cx="90" cy="55" r="30" fill="#e8d4b4"/>
    <circle cx="80" cy="35" r="12" fill="#d8c4a4"/>
    <circle cx="100" cy="35" r="12" fill="#d8c4a4"/>
    <circle cx="80" cy="35" r="7" fill="#ffb3d2"/>
    <circle cx="100" cy="35" r="7" fill="#ffb3d2"/>
    <circle cx="95" cy="58" r="2" fill="#2b2140"/>
    <ellipse cx="105" cy="65" rx="5" ry="3" fill="#ff8fb0"/>
    <!-- red bow -->
    <path d="M70 22 L90 32 L80 10 Z" fill="#d93048"/>
    <path d="M110 22 L90 32 L100 10 Z" fill="#d93048"/>
    <circle cx="90" cy="22" r="5" fill="#d93048"/>
  </g>
  <!-- broom -->
  <g transform="translate(195,240)">
    <rect x="0" y="0" width="6" height="60" fill="#8a5a2a"/>
    <polygon points="-8,60 14,60 18,85 -12,85" fill="#f2c14e"/>
  </g>
  <text x="150" y="50" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="26" font-weight="800" fill="#2b2140">La Rateta</text>
  <text x="150" y="80" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="18" font-weight="700" fill="#d93048">que escombrava l'escaleta</text>
</svg>
