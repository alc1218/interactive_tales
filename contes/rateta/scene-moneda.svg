<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#fff8d6"/>
  <g fill="#c9a26b" stroke="#8a5a2a" stroke-width="2">
    <rect x="0" y="240" width="300" height="60"/>
  </g>
  <!-- mouse -->
  <g transform="translate(60,130)">
    <ellipse cx="50" cy="70" rx="40" ry="32" fill="#d8c4a4"/>
    <circle cx="85" cy="50" r="24" fill="#e8d4b4"/>
    <circle cx="78" cy="32" r="10" fill="#d8c4a4"/><circle cx="95" cy="32" r="10" fill="#d8c4a4"/>
    <circle cx="90" cy="52" r="1.8" fill="#2b2140"/>
    <ellipse cx="98" cy="58" rx="4" ry="2.5" fill="#ff8fb0"/>
    <path d="M85 65 Q90 75 95 65" stroke="#2b2140" stroke-width="1" fill="none"/>
  </g>
  <!-- coin -->
  <g transform="translate(200,200)">
    <circle cx="20" cy="20" r="22" fill="#ffd86b" stroke="#c08a1f" stroke-width="2"/>
    <text x="20" y="26" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="20" font-weight="800" fill="#8a5a2a">€</text>
  </g>
  <!-- sparkles -->
  <g fill="#ffe27a"><circle cx="190" cy="175" r="2"/><circle cx="250" cy="180" r="3"/><circle cx="230" cy="160" r="2"/></g>
  <text x="150" y="40" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="20" font-weight="800" fill="#d93048">Una moneda!</text>
</svg>
