<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bgR3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe6e8"/>
      <stop offset="1" stop-color="#fff5d8"/>
    </linearGradient>
    <radialGradient id="glowR3" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#ffd0e0" stop-opacity=".7"/>
      <stop offset="1" stop-color="#ffd0e0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bowR3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef4153"/>
      <stop offset="1" stop-color="#a3192a"/>
    </linearGradient>
    <radialGradient id="mouseBodyR3" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#f8e8d0"/>
      <stop offset="1" stop-color="#c9a878"/>
    </radialGradient>
    <radialGradient id="mouseHeadR3" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#fbf2dc"/>
      <stop offset="1" stop-color="#d8b888"/>
    </radialGradient>
    <filter id="softShadowR3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#bgR3)"/>

  <!-- caption -->
  <text x="300" y="80" text-anchor="middle" font-family="Georgia" font-size="32" fill="#a3192a" font-weight="bold" font-style="italic">Un llaç vermell!</text>

  <!-- pink halo behind mouse -->
  <circle cx="300" cy="340" r="200" fill="url(#glowR3)"/>

  <!-- ground -->
  <ellipse cx="300" cy="560" rx="600" ry="120" fill="#ffd0d8" opacity=".6"/>

  <!-- Mouse with red bow -->
  <g filter="url(#softShadowR3)" transform="translate(300,340)">
    <ellipse cx="0" cy="120" rx="50" ry="8" fill="#0006"/>
    <!-- body -->
    <ellipse cx="0" cy="65" rx="50" ry="55" fill="url(#mouseBodyR3)"/>
    <ellipse cx="0" cy="80" rx="28" ry="34" fill="#fff5e0" opacity=".7"/>
    <ellipse cx="-15" cy="115" rx="11" ry="7" fill="#c9a878"/>
    <ellipse cx="17" cy="115" rx="11" ry="7" fill="#c9a878"/>
    <!-- head -->
    <circle cx="0" cy="10" r="36" fill="url(#mouseHeadR3)"/>
    <!-- ears -->
    <circle cx="-22" cy="-15" r="15" fill="url(#mouseHeadR3)"/>
    <circle cx="-22" cy="-15" r="9" fill="#ffb8c8"/>
    <circle cx="22" cy="-15" r="15" fill="url(#mouseHeadR3)"/>
    <circle cx="22" cy="-15" r="9" fill="#ffb8c8"/>
    <!-- eyes -->
    <circle cx="-9" cy="8" r="5" fill="#fff"/>
    <circle cx="-9" cy="8" r="2.8" fill="#2b2140"/>
    <circle cx="-8" cy="7" r="1" fill="#fff"/>
    <circle cx="11" cy="8" r="5" fill="#fff"/>
    <circle cx="11" cy="8" r="2.8" fill="#2b2140"/>
    <circle cx="12" cy="7" r="1" fill="#fff"/>
    <!-- nose & smile -->
    <ellipse cx="1" cy="20" rx="3.5" ry="2.8" fill="#e87a98"/>
    <path d="M-7 28 q8 8 16 0" stroke="#7a2a3e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- whiskers -->
    <line x1="-38" y1="20" x2="-15" y2="20" stroke="#7a5a3a" stroke-width="1"/>
    <line x1="-38" y1="25" x2="-15" y2="23" stroke="#7a5a3a" stroke-width="1"/>
    <line x1="15" y1="20" x2="38" y2="20" stroke="#7a5a3a" stroke-width="1"/>
    <line x1="15" y1="23" x2="38" y2="25" stroke="#7a5a3a" stroke-width="1"/>
    <circle cx="-22" cy="22" r="5" fill="#ff9bb5" opacity=".6"/>
    <circle cx="24" cy="22" r="5" fill="#ff9bb5" opacity=".6"/>
    <!-- tail -->
    <path d="M50 85 q40 -10 55 25" stroke="#c9a878" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- arms -->
    <path d="M-40 60 q-20 5 -25 25" stroke="url(#mouseBodyR3)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M40 60 q20 5 25 25" stroke="url(#mouseBodyR3)" stroke-width="10" fill="none" stroke-linecap="round"/>

    <!-- BIG red bow on top of head -->
    <g transform="translate(0,-30)">
      <path d="M0 0 L-30 -20 L-30 10 L-5 5 z" fill="url(#bowR3)"/>
      <path d="M0 0 L30 -20 L30 10 L5 5 z" fill="url(#bowR3)"/>
      <circle r="6" fill="#a3192a"/>
      <path d="M-25 -16 q5 8 -3 16" stroke="#fff" stroke-width="1.5" fill="none" opacity=".5"/>
      <path d="M25 -16 q-5 8 3 16" stroke="#fff" stroke-width="1.5" fill="none" opacity=".5"/>
    </g>
  </g>

  <!-- mini hearts -->
  <g fill="#ef4153" opacity=".7">
    <path d="M150 200 c-8 -4, -8 -14, -4 -14 s4 4 4 4 s0 -4 4 -4 s4 10 -4 14 z"/>
    <path d="M460 220 c-7 -3, -7 -12, -3 -12 s3 3 3 3 s0 -3 3 -3 s3 9 -3 12 z"/>
    <path d="M120 380 c-6 -3, -6 -10, -3 -10 s3 3 3 3 s0 -3 3 -3 s3 7 -3 10 z"/>
    <path d="M490 400 c-6 -3, -6 -10, -3 -10 s3 3 3 3 s0 -3 3 -3 s3 7 -3 10 z"/>
  </g>
</svg>
