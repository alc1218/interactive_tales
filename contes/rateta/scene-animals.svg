<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#eaf4ff"/>
  <rect x="0" y="240" width="300" height="60" fill="#8cd2a0"/>
  <!-- dog -->
  <g transform="translate(15,150)">
    <ellipse cx="30" cy="60" rx="28" ry="22" fill="#b07a3e"/>
    <circle cx="55" cy="45" r="20" fill="#c48d50"/>
    <ellipse cx="45" cy="35" rx="6" ry="12" fill="#8a5a2a"/>
    <circle cx="58" cy="45" r="1.5" fill="#2b2140"/>
    <ellipse cx="68" cy="52" rx="4" ry="3" fill="#2b2140"/>
    <text x="30" y="95" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="12" font-weight="700" fill="#2b2140">Bup bup!</text>
  </g>
  <!-- pig -->
  <g transform="translate(110,150)">
    <ellipse cx="30" cy="60" rx="32" ry="24" fill="#ffb0c8"/>
    <circle cx="55" cy="45" r="20" fill="#ffc4d6"/>
    <ellipse cx="62" cy="50" rx="6" ry="4" fill="#ff8fb0"/>
    <circle cx="60" cy="45" r="1.5" fill="#2b2140"/>
    <text x="30" y="95" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="12" font-weight="700" fill="#2b2140">Oink!</text>
  </g>
  <!-- rooster -->
  <g transform="translate(210,150)">
    <ellipse cx="30" cy="60" rx="25" ry="22" fill="#ffb703"/>
    <circle cx="50" cy="40" r="15" fill="#ffb703"/>
    <polygon points="47,30 50,20 53,30 56,22 59,30" fill="#d93048"/>
    <polygon points="60,45 70,42 60,52" fill="#ffb703"/>
    <circle cx="52" cy="42" r="1.5" fill="#2b2140"/>
    <text x="30" y="95" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="10" font-weight="700" fill="#2b2140">Quiquiriquic!</text>
  </g>
</svg>
